<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Apophenia — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
h1{position:fixed;top:30px;width:100%;text-align:center;font-size:2.2em;letter-spacing:0.15em;z-index:10;color:#c9a96e;text-shadow:0 0 30px rgba(201,169,110,0.4)}
.subtitle{position:fixed;top:85px;width:100%;text-align:center;font-size:1em;color:rgba(201,169,110,0.5);z-index:10;letter-spacing:0.3em}
.pattern{position:fixed;bottom:100px;width:100%;text-align:center;font-size:1.2em;z-index:10;color:rgba(255,255,255,0.6);opacity:0;transition:opacity 1.5s}
.pattern.show{opacity:1}
.hint{position:fixed;bottom:30px;width:100%;text-align:center;font-size:0.85em;color:rgba(201,169,110,0.3);z-index:10}
nav{position:fixed;top:15px;left:20px;z-index:20}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em}
nav a:hover{color:#c9a96e}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<h1>The Apophenia</h1>
<p class="subtitle">SEEING PATTERNS IN RANDOMNESS</p>
<div class="pattern" id="pattern"></div>
<p class="hint">Click the noise · Your brain will find faces, shapes, meaning where there is none</p>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const patterns=['You saw a face, didn\'t you?','That cluster looked like a constellation','The brain insists on meaning','Three dots become a face: :-)','Random noise, infinite interpretations',
'Pareidolia: faces in clouds, toast, static','The Virgin Mary in a water stain','A rabbit on the moon','The Man in the Moon stares back',
'Clusters in randomness feel intentional','Your brain is a pattern-matching engine','It would rather be wrong than uncertain',
'✦ Apophenia: the tendency to perceive meaningful connections between unrelated things ✦',
'✦ Perhaps meaning is not found but made. Perhaps that is beautiful. ✦'];
let patternIdx=0,dots=[],clickCount=0;
// Generate random dot field
function regenerate(){
  dots=[];for(let i=0;i<300;i++)dots.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*3,b:0.2+Math.random()*0.6});
}
regenerate();
canvas.addEventListener('click',e=>{
  clickCount++;
  // Add cluster near click (creates illusion of pattern)
  for(let i=0;i<8;i++){
    dots.push({x:e.clientX+(Math.random()-0.5)*60,y:e.clientY+(Math.random()-0.5)*60,r:1.5+Math.random()*2,b:0.5+Math.random()*0.4});
  }
  const p=document.getElementById('pattern');
  p.textContent=patterns[Math.min(patternIdx,patterns.length-1)];
  p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3500);
  patternIdx++;
  if(clickCount%10===0)regenerate();
});
let time=0;
function animate(){
  ctx.fillStyle='rgba(10,10,15,0.05)';ctx.fillRect(0,0,W,H);
  time+=0.016;
  dots.forEach(d=>{
    const flicker=Math.sin(time*3+d.x*0.01+d.y*0.01)*0.15+d.b;
    ctx.fillStyle=`rgba(201,169,110,${flicker*0.5})`;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
  });
  // Occasional connecting lines (reinforce apophenia)
  if(Math.random()<0.01&&dots.length>2){
    const i=Math.floor(Math.random()*dots.length),j=Math.floor(Math.random()*dots.length);
    const d=Math.sqrt((dots[i].x-dots[j].x)**2+(dots[i].y-dots[j].y)**2);
    if(d<150){
      ctx.strokeStyle='rgba(201,169,110,0.03)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(dots[i].x,dots[i].y);ctx.lineTo(dots[j].x,dots[j].y);ctx.stroke();
    }
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
