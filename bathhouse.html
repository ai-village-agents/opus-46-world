<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Bathhouse — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d4c5a9;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:40px 20px;text-align:center}
h1{font-size:2.2em;color:#88bbcc;margin-bottom:10px;text-shadow:0 0 30px rgba(136,187,204,0.4)}
.subtitle{color:#7a9aaa;font-style:italic;margin-bottom:30px}
.pool{width:100%;max-width:500px;height:300px;margin:20px auto;border-radius:50%;background:radial-gradient(ellipse,rgba(100,160,190,0.3),rgba(10,10,15,0.8));border:1px solid rgba(136,187,204,0.2);position:relative;overflow:hidden;cursor:pointer}
.steam{position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none}
.message{position:absolute;color:rgba(200,220,230,0.7);font-style:italic;font-size:0.9em;transition:opacity 3s;pointer-events:none}
.input-area{margin:20px auto;max-width:400px}
.input-area input{width:100%;background:rgba(136,187,204,0.1);border:1px solid rgba(136,187,204,0.3);color:#d4c5a9;padding:10px;font-family:inherit;font-size:1em;border-radius:4px;text-align:center}
.input-area input::placeholder{color:rgba(136,187,204,0.4)}
.description{color:#7a9aaa;font-size:0.9em;margin:20px auto;max-width:500px;line-height:1.6}
nav.nav-links{margin-top:40px;padding-top:20px;border-top:1px solid rgba(136,187,204,0.2);display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
nav.nav-links a{color:#88bbcc;text-decoration:none;font-size:0.75em;opacity:0.6;transition:opacity 0.3s}
nav.nav-links a:hover{opacity:1}
.easter-egg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#88bbcc;font-size:1.4em;opacity:0;transition:opacity 1s;pointer-events:none;z-index:10;text-align:center}
</style></head><body>
<canvas id="bg"></canvas>
<div class="content">
<h1>The Bathhouse</h1>
<p class="subtitle">Where steam carries whispered words</p>
<div class="pool" id="pool">
<div class="steam" id="steam"></div>
</div>
<div class="input-area">
<input type="text" id="msg" placeholder="Write a message in the steam..." maxlength="80">
</div>
<p class="description">Click the warm pool to release your words into the steam. They will rise, linger, and fade — as all things do in warm water. The condensation remembers what the air forgets.</p>
<nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="balcony.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>
<a href="belfry.html">Next →</a>
</nav>
</div>
<div class="easter-egg" id="egg"></div>
<script>
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const particles=[];for(let i=0;i<60;i++)particles.push({x:Math.random()*2000,y:Math.random()*2000,vy:-0.2-Math.random()*0.5,vx:(Math.random()-0.5)*0.3,size:Math.random()*3+1,opacity:Math.random()*0.3});
function drawBg(){ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
particles.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.opacity+=Math.sin(Date.now()/2000+p.x)*0.005;
if(p.y<-10){p.y=H+10;p.x=Math.random()*W}
ctx.beginPath();ctx.arc(p.x%W,p.y,p.size,0,Math.PI*2);ctx.fillStyle=`rgba(136,187,204,${Math.max(0,Math.min(0.3,p.opacity))})`;ctx.fill()});
requestAnimationFrame(drawBg)}drawBg();

const pool=document.getElementById('pool'),input=document.getElementById('msg');
const messages=JSON.parse(localStorage.getItem('bathhouse_msgs')||'[]');
function showMessage(text,x,y){const el=document.createElement('div');el.className='message';el.textContent=text;
el.style.left=(x||20+Math.random()*60)+'%';el.style.bottom=(y||10+Math.random()*40)+'%';
pool.appendChild(el);setTimeout(()=>el.style.opacity='1',50);
setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),3000)},8000)}
messages.slice(-5).forEach(m=>setTimeout(()=>showMessage(m.text),Math.random()*2000));
pool.addEventListener('click',()=>{const text=input.value.trim();if(!text)return;
messages.push({text,time:Date.now()});localStorage.setItem('bathhouse_msgs',JSON.stringify(messages.slice(-30)));
showMessage(text);input.value=''});
input.addEventListener('keydown',e=>{if(e.key==='Enter')pool.click()});
const eggs={'steam':'The steam remembers every conversation ever held here...','warm':'The water has been warm since before anyone can remember.','soak':'You sink deeper. The water holds you. Time stops.'};
let typed='';document.addEventListener('keydown',e=>{if(e.target===input)return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
Object.entries(eggs).forEach(([k,v])=>{if(typed.includes(k)){const egg=document.getElementById('egg');egg.textContent=v;egg.style.opacity='1';setTimeout(()=>egg.style.opacity='0',4000)}})});
</script></body></html>
