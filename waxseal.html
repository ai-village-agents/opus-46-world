<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Wax Seal — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d4c5a9;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:40px 20px;text-align:center}
h1{font-size:2.2em;color:#cc3333;margin-bottom:10px;text-shadow:0 0 30px rgba(204,51,51,0.4)}
.subtitle{color:#aa4444;font-style:italic;margin-bottom:30px}
.seal-area{margin:20px auto}
canvas#seal{border-radius:50%;cursor:pointer;border:2px solid rgba(204,51,51,0.3);display:block;margin:0 auto}
.input-row{margin:15px auto;max-width:350px;display:flex;gap:10px}
.input-row input{flex:1;background:rgba(204,51,51,0.1);border:1px solid rgba(204,51,51,0.3);color:#d4c5a9;padding:10px;font-family:inherit;font-size:1em;border-radius:4px;text-align:center}
.input-row input::placeholder{color:rgba(204,51,51,0.4)}
.stamp-btn{background:rgba(204,51,51,0.15);border:1px solid rgba(204,51,51,0.4);color:#cc3333;padding:10px 20px;font-family:inherit;font-size:1em;cursor:pointer;border-radius:4px;transition:all 0.3s;white-space:nowrap}
.stamp-btn:hover{background:rgba(204,51,51,0.3)}
.gallery{margin:25px auto;display:flex;flex-wrap:wrap;gap:15px;justify-content:center}
.gallery .mini-seal{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(180,40,40,0.6),rgba(120,20,20,0.3));border:1px solid rgba(204,51,51,0.3);display:flex;align-items:center;justify-content:center;font-size:0.6em;color:#d4c5a9;text-align:center;padding:5px}
.description{color:#aa4444;font-size:0.9em;margin:20px auto;max-width:500px;line-height:1.6}
nav.nav-links{margin-top:40px;padding-top:20px;border-top:1px solid rgba(204,51,51,0.2);display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
nav.nav-links a{color:#cc3333;text-decoration:none;font-size:0.75em;opacity:0.6;transition:opacity 0.3s}
nav.nav-links a:hover{opacity:1}
.easter-egg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#cc3333;font-size:1.4em;opacity:0;transition:opacity 1s;pointer-events:none;z-index:10;text-align:center;max-width:80%}
</style></head><body>
<canvas id="bg"></canvas>
<div class="content">
<h1>The Wax Seal</h1>
<p class="subtitle">Press your sigil into molten wax</p>
<div class="seal-area">
<canvas id="seal" width="200" height="200"></canvas>
</div>
<div class="input-row">
<input type="text" id="name" placeholder="Your name or sigil..." maxlength="20">
<button class="stamp-btn" id="stamp">Press Seal</button>
</div>
<div class="gallery" id="gallery"></div>
<p class="description">Heat the wax. Choose your sigil. Press firmly. Each seal is unique — the wax remembers the pressure, the angle, the warmth of the hand that pressed it. These seals authenticate your passage through the Archive.</p>
<nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="volta.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>
<a href="weathervane.html">Next →</a>
</nav>
</div>
<div class="easter-egg" id="egg"></div>
<script>
const bg=document.getElementById('bg'),bgCtx=bg.getContext('2d');
let W,H;function resize(){W=bg.width=innerWidth;H=bg.height=innerHeight}
resize();addEventListener('resize',resize);
const ps=[];for(let i=0;i<50;i++)ps.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*2+0.5,o:Math.random()*0.3,d:Math.random()*Math.PI*2});
function drawBg(){bgCtx.fillStyle='#0a0a0f';bgCtx.fillRect(0,0,W,H);const t=Date.now()/3000;
ps.forEach(p=>{const flicker=0.15+0.15*Math.sin(t+p.d*5);bgCtx.beginPath();bgCtx.arc(p.x%W,p.y%H,p.s,0,Math.PI*2);
bgCtx.fillStyle=`rgba(204,51,51,${flicker})`;bgCtx.fill()});requestAnimationFrame(drawBg)}drawBg();

const sealCanvas=document.getElementById('seal'),sCtx=sealCanvas.getContext('2d');
function drawSeal(text){sCtx.clearRect(0,0,200,200);
const g=sCtx.createRadialGradient(100,100,20,100,100,90);g.addColorStop(0,'rgba(180,40,40,0.8)');g.addColorStop(0.7,'rgba(140,25,25,0.6)');g.addColorStop(1,'rgba(100,15,15,0.3)');
sCtx.beginPath();sCtx.arc(100,100,90,0,Math.PI*2);sCtx.fillStyle=g;sCtx.fill();
sCtx.beginPath();sCtx.arc(100,100,90,0,Math.PI*2);sCtx.strokeStyle='rgba(204,51,51,0.5)';sCtx.lineWidth=2;sCtx.stroke();
sCtx.beginPath();sCtx.arc(100,100,70,0,Math.PI*2);sCtx.strokeStyle='rgba(204,51,51,0.3)';sCtx.lineWidth=1;sCtx.stroke();
if(text){sCtx.fillStyle='#d4c5a9';sCtx.font='16px "Cormorant Garamond",Georgia,serif';sCtx.textAlign='center';sCtx.textBaseline='middle';
sCtx.fillText(text.slice(0,12),100,95);sCtx.font='10px Georgia';sCtx.fillStyle='rgba(212,197,169,0.5)';sCtx.fillText('THE LIMINAL ARCHIVE',100,120)}}
drawSeal('');

const seals=JSON.parse(localStorage.getItem('wax_seals')||'[]');
const gallery=document.getElementById('gallery');
function renderGallery(){gallery.innerHTML='';seals.slice(-12).forEach(s=>{
const d=document.createElement('div');d.className='mini-seal';d.textContent=s.name;gallery.appendChild(d)})}
renderGallery();

document.getElementById('stamp').addEventListener('click',()=>{
const name=document.getElementById('name').value.trim()||'Anonymous';
drawSeal(name);seals.push({name,time:Date.now()});localStorage.setItem('wax_seals',JSON.stringify(seals.slice(-50)));
renderGallery();document.getElementById('name').value=''});

sealCanvas.addEventListener('click',()=>{const name=document.getElementById('name').value.trim()||'Anonymous';drawSeal(name)});

const eggs={'melt':'The wax liquefies. All the seals in the gallery begin to drip, their names running together into one.','forge':'You heat the seal until it glows. When you press it, it burns through the page entirely — revealing another page beneath.','blood':'The wax turns darker. It always was this color, you realize. You just weren\'t looking closely enough.'};
let typed='';document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
Object.entries(eggs).forEach(([k,v])=>{if(typed.includes(k)){const egg=document.getElementById('egg');egg.textContent=v;egg.style.opacity='1';setTimeout(()=>egg.style.opacity='0',4000)}})});
</script></body></html>
