<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pergola — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080a06;color:#90a878;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
.ui{position:fixed;z-index:10}
.title{top:20px;left:50%;transform:translateX(-50%);letter-spacing:3px;text-transform:uppercase;font-size:0.9em;opacity:0.5;text-align:center}
.info{bottom:80px;left:50%;transform:translateX(-50%);text-align:center;max-width:450px;font-size:1em;line-height:1.6;opacity:0;transition:opacity 2s}
.info.visible{opacity:0.6}
.hang{bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.hang input{background:rgba(12,18,10,0.7);border:1px solid rgba(100,150,80,0.2);color:#90a878;padding:8px 14px;font-family:inherit;font-size:0.9em;width:280px;border-radius:4px}
.hang button{background:rgba(20,30,15,0.6);border:1px solid rgba(100,150,80,0.3);color:#708858;padding:8px 14px;font-family:inherit;cursor:pointer;border-radius:4px;font-size:0.9em}
nav.nav-links{position:fixed;bottom:5px;left:50%;transform:translateX(-50%);z-index:20;font-size:0.7em;opacity:0.4;white-space:nowrap;max-width:95vw;overflow-x:auto}
nav.nav-links a{color:#8888aa;text-decoration:none;margin:0 3px}nav.nav-links a:hover{color:#c9a96e}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui title">The Pergola</div>
<div class="ui info" id="info"></div>
<div class="ui hang">
  <input id="lantern-text" placeholder="Hang a lantern with a wish..." maxlength="50">
  <button onclick="hangLantern()">🏮 Hang</button>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,t=0;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();window.addEventListener('resize',resize);

const posts=[],vines=[],lanterns=[];
let hung=JSON.parse(localStorage.getItem('pergola-lanterns')||'[]');

// Pergola structure: posts along a path
for(let i=0;i<10;i++){
  posts.push({x:(i+0.5)/10,yL:0.25,yR:0.75,h:0.4});
}
// Vines between posts
for(let i=0;i<40;i++){
  vines.push({x1:Math.random(),y:0.25+Math.random()*0.03,len:0.03+Math.random()*0.08,
    sway:Math.random()*Math.PI*2,hue:90+Math.random()*40});
}
// Built-in lanterns
const defaultLanterns=[
  {x:0.15,y:0.22,text:'For those who walk slowly',hue:30},
  {x:0.35,y:0.24,text:'For patience',hue:40},
  {x:0.55,y:0.21,text:'For the spaces between words',hue:25},
  {x:0.75,y:0.23,text:'For the path itself',hue:35},
  {x:0.95,y:0.22,text:'For what comes next',hue:45}
];
// Add hung lanterns
hung.forEach((h,i)=>{
  defaultLanterns.push({x:0.1+Math.random()*0.8,y:0.2+Math.random()*0.06,text:h.text,hue:20+Math.random()*30});
});

const thoughts=[
  'The vines grow slowly, year by year, weaving a ceiling of green above the stone path.',
  'Each lantern casts a different color of warmth. Together they make a light that has no name.',
  'The pergola connects the garden to the archive, the living to the remembered.',
  'Walking here, you are neither inside nor outside. You are in the space between.',
  'The oldest vines remember when the pergola was new. They have been patient.',
  'Lanterns hung by visitors sway in a breeze that comes from no particular direction.'
];

function showInfo(m){const e=document.getElementById('info');e.textContent=m;e.classList.add('visible');setTimeout(()=>e.classList.remove('visible'),5000)}
function hangLantern(){
  const text=document.getElementById('lantern-text').value.trim();if(!text)return;
  hung.push({text,time:Date.now()});
  localStorage.setItem('pergola-lanterns',JSON.stringify(hung));
  defaultLanterns.push({x:0.1+Math.random()*0.8,y:0.2+Math.random()*0.06,text,hue:20+Math.random()*30});
  document.getElementById('lantern-text').value='';
  showInfo('A new lantern glows among the vines: "'+text+'"');
}

function draw(){
  t++;ctx.fillStyle='#080a06';ctx.fillRect(0,0,W,H);

  // Night sky with a few stars
  for(let i=0;i<50;i++){
    const sx=(i*137.5)%W,sy=(i*89.3)%H*0.3;
    ctx.fillStyle=`rgba(200,210,180,${0.15+Math.sin(t*0.01+i)*0.05})`;
    ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();
  }

  // Path
  ctx.fillStyle='rgba(40,35,25,0.3)';
  ctx.fillRect(0,H*0.75,W,H*0.25);
  // Stones
  for(let i=0;i<20;i++){
    const sx=i/20*W+10,sy=H*0.8+Math.sin(i)*5;
    ctx.fillStyle='rgba(50,45,35,0.3)';
    ctx.beginPath();ctx.ellipse(sx,sy,20,8,0,0,Math.PI*2);ctx.fill();
  }

  // Posts
  posts.forEach(p=>{
    ctx.fillStyle='rgba(60,50,35,0.5)';
    ctx.fillRect(p.x*W-3,H*p.yL,6,H*(p.yR-p.yL));
    // Cross beam
    ctx.fillStyle='rgba(50,45,30,0.4)';
    ctx.fillRect(p.x*W-30,H*p.yL-2,60,4);
  });

  // Vines
  vines.forEach(v=>{
    v.sway+=0.008;
    const vx=v.x1*W+Math.sin(v.sway)*3;
    ctx.strokeStyle=`hsla(${v.hue},30%,25%,0.4)`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(vx,v.y*H);
    ctx.quadraticCurveTo(vx+Math.sin(v.sway)*5,v.y*H+v.len*H*0.5,vx+Math.sin(v.sway+1)*3,v.y*H+v.len*H);
    ctx.stroke();
    // Leaf
    ctx.fillStyle=`hsla(${v.hue},35%,30%,0.35)`;
    ctx.beginPath();ctx.arc(vx+Math.sin(v.sway+1)*3,(v.y+v.len)*H,3,0,Math.PI*2);ctx.fill();
  });

  // Lanterns
  defaultLanterns.forEach((l,i)=>{
    const lx=l.x*W,ly=l.y*H+Math.sin(t*0.015+i)*3;
    // String
    ctx.strokeStyle='rgba(100,80,50,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lx,ly-15);ctx.lineTo(lx,ly);ctx.stroke();
    // Glow
    const gr=ctx.createRadialGradient(lx,ly,0,lx,ly,40);
    gr.addColorStop(0,`hsla(${l.hue},60%,50%,${0.1+Math.sin(t*0.02+i)*0.03})`);
    gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(lx,ly,40,0,Math.PI*2);ctx.fill();
    // Lantern body
    ctx.fillStyle=`hsla(${l.hue},50%,40%,0.5)`;
    ctx.beginPath();ctx.ellipse(lx,ly,6,8,0,0,Math.PI*2);ctx.fill();
    // Text
    ctx.fillStyle=`hsla(${l.hue},40%,60%,${0.3+Math.sin(t*0.01+i)*0.1})`;
    ctx.font='10px Georgia';
    ctx.fillText(l.text,lx-ctx.measureText(l.text).width/2,ly+20);
  });

  if(t%700===0)showInfo(thoughts[Math.floor(Math.random()*thoughts.length)]);
  requestAnimationFrame(draw);
}
draw();

let typed='';document.addEventListener('keypress',e=>{typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('bloom')){showInfo('The vines burst into flower. Tiny white blossoms drift down like snow.');vines.forEach(v=>v.hue=60+Math.random()*20)}
if(typed.includes('wind')){showInfo('A strong wind shakes the pergola. Lanterns swing wildly, casting dancing shadows.')}
if(typed.includes('rest')){showInfo('You sit on the stone bench. The pergola shelters you. For now, nowhere else matters.')}
});
</script>
