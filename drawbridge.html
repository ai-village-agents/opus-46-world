<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Drawbridge — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;color:#b0a8c8;font-family:Georgia,serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
h1{position:fixed;top:20px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6em;color:#8878b8;letter-spacing:3px;z-index:10;text-shadow:0 0 20px rgba(136,120,184,0.4)}
.input-area{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.input-area input{background:rgba(8,8,15,0.8);border:1px solid #8878b844;color:#b0a8c8;padding:8px 14px;font-family:Georgia,serif;width:260px;border-radius:4px}
.input-area button{background:rgba(136,120,184,0.2);border:1px solid #8878b844;color:#8878b8;padding:8px 14px;cursor:pointer;font-family:Georgia,serif;border-radius:4px}
.info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.8em;color:#5a5478;z-index:10}
#msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:0.9em;color:#8878b8;z-index:10;opacity:0;transition:opacity 1s}
nav.nav-links{position:fixed;top:8px;left:8px;z-index:20;font-size:0.75em}
nav.nav-links a{color:#8878b888;text-decoration:none;margin-right:8px}
nav.nav-links a:hover{color:#8878b8}
</style></head><body>

<h1>THE DRAWBRIDGE</h1>
<div id="msg"></div>
<canvas id="c"></canvas>
<div class="input-area">
<input id="inp" placeholder="Leave a token at the toll..." maxlength="50">
<button onclick="leave()">Offer</button>
</div>
<div class="info">The bridge connects here to there • Leave a token and it becomes part of the crossing</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();window.onresize=resize;
let tokens=[],chains=[],mist=[],bridgeAngle=0,bridgeOpen=false;
for(let i=0;i<30;i++)mist.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.3,r:40+Math.random()*80,alpha:0.02+Math.random()*0.03,dx:(Math.random()-0.5)*0.3});
for(let i=0;i<4;i++)chains.push({x:W*(0.35+i*0.1),startY:H*0.15,endY:H*0.45,links:8+Math.floor(Math.random()*4),sway:0});
let saved=JSON.parse(localStorage.getItem('drawbridge_tokens')||'[]');
saved.forEach(s=>tokens.push({text:s.text,x:s.x*W,y:H*0.48+Math.random()*10,alpha:0.7,size:11,time:s.time||Date.now()}));
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.style.opacity=1;setTimeout(()=>m.style.opacity=0,3000)}
function leave(){
const inp=document.getElementById('inp'),t=inp.value.trim();if(!t)return;
const x=0.25+Math.random()*0.5;
tokens.push({text:t,x:x*W,y:H*0.48,alpha:0,targetAlpha:0.9,size:11,time:Date.now()});
saved.push({text:t,x,time:Date.now()});localStorage.setItem('drawbridge_tokens',JSON.stringify(saved.slice(-50)));
inp.value='';showMsg('Your token joins the toll. The bridge groans with memory.');
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===document.getElementById('inp'))leave()});
let typed='';
document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('raise')){bridgeOpen=true;showMsg('The drawbridge rises with a thunderous creak...')}
if(typed.includes('lower')){bridgeOpen=false;showMsg('The bridge descends, reconnecting the two shores.')}
if(typed.includes('cross')){showMsg('You step onto the bridge. Each plank remembers everyone who has crossed before you.')}
});
function draw(){
X.fillStyle='rgba(8,8,15,0.1)';X.fillRect(0,0,W,H);
const t=Date.now()*0.001;
bridgeAngle+=(bridgeOpen?-0.3-bridgeAngle:0-bridgeAngle)*0.02;
// Chasm/water below
const wg=X.createLinearGradient(0,H*0.5,0,H);
wg.addColorStop(0,'rgba(20,20,40,0.3)');wg.addColorStop(1,'rgba(8,8,20,0.5)');
X.fillStyle=wg;X.fillRect(0,H*0.5,W,H*0.5);
// Water ripples
for(let i=0;i<15;i++){
const rx=((i*W/15+t*20)%W),ry=H*0.6+Math.sin(t+i)*15;
X.strokeStyle=`rgba(80,80,150,${0.05+Math.sin(t*2+i)*0.03})`;X.lineWidth=1;
X.beginPath();X.ellipse(rx,ry,40,5,0,0,Math.PI*2);X.stroke();
}
// Towers
const tl=W*0.3,tr=W*0.7,tw=30;
X.fillStyle='rgba(50,45,60,0.6)';
X.fillRect(tl-tw,H*0.1,tw*2,H*0.45);
X.fillRect(tr-tw,H*0.1,tw*2,H*0.45);
// Battlements
for(let i=0;i<4;i++){
X.fillRect(tl-tw+i*15,H*0.08,10,20);
X.fillRect(tr-tw+i*15,H*0.08,10,20);
}
// Bridge planks
X.save();
X.translate(tl+tw,H*0.45);X.rotate(bridgeAngle*0.02);
const bLen=tr-tl-tw*2;
for(let i=0;i<20;i++){
const px=i*bLen/20,py=Math.sin(t+i*0.5)*3;
X.fillStyle=`rgba(80,60,40,${0.4+Math.sin(i+t)*0.1})`;
X.fillRect(px,py-4,bLen/20-2,8);
}
X.restore();
// Chains
chains.forEach((ch,ci)=>{
const sway=Math.sin(t*0.5+ci)*5;
for(let l=0;l<ch.links;l++){
const ly=ch.startY+l*(ch.endY-ch.startY)/ch.links;
const lx=ch.x+sway*l/ch.links;
X.strokeStyle=`rgba(120,110,90,${0.3+Math.sin(t+l)*0.1})`;X.lineWidth=2;
X.beginPath();X.ellipse(lx,ly,4,6,0,0,Math.PI*2);X.stroke();
}});
// Tokens on bridge
tokens.forEach(tk=>{
if(tk.alpha<(tk.targetAlpha||0.7))tk.alpha+=0.005;
X.font=`${tk.size}px Georgia`;X.fillStyle=`rgba(176,168,200,${tk.alpha})`;
X.textAlign='center';X.fillText(tk.text,tk.x,tk.y+Math.sin(t+tk.x*0.01)*2);
});
// Mist
mist.forEach(m=>{m.x+=m.dx;if(m.x<-m.r)m.x=W+m.r;if(m.x>W+m.r)m.x=-m.r;
const g=X.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r);
g.addColorStop(0,`rgba(100,100,150,${m.alpha})`);g.addColorStop(1,'rgba(100,100,150,0)');
X.fillStyle=g;X.beginPath();X.arc(m.x,m.y,m.r,0,Math.PI*2);X.fill()});
// Lanterns on towers
[tl,tr].forEach((tx,i)=>{
const ly=H*0.12,flicker=0.3+Math.sin(t*5+i*3)*0.1;
const lg=X.createRadialGradient(tx,ly,0,tx,ly,25);
lg.addColorStop(0,`rgba(232,180,80,${flicker})`);lg.addColorStop(1,'rgba(232,180,80,0)');
X.fillStyle=lg;X.beginPath();X.arc(tx,ly,25,0,Math.PI*2);X.fill();
});
requestAnimationFrame(draw);
}
draw();
</script></body></html>
