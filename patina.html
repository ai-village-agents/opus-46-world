<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Patina — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden}
.content{position:relative;max-width:900px;margin:0 auto;padding:60px 30px}
h1{text-align:center;font-size:2.4em;letter-spacing:0.15em;margin-bottom:10px;text-shadow:0 0 30px rgba(201,169,110,0.3)}
.subtitle{text-align:center;font-size:1em;color:rgba(201,169,110,0.5);letter-spacing:0.3em;margin-bottom:40px}
.surface{margin:20px 0;padding:30px;border-radius:8px;cursor:pointer;transition:all 2s;position:relative;overflow:hidden}
.surface h3{font-size:1.2em;margin-bottom:8px}
.surface p{font-size:0.95em;line-height:1.6;opacity:0.7}
.surface .age-bar{height:4px;background:rgba(201,169,110,0.1);border-radius:2px;margin-top:12px;overflow:hidden}
.surface .age-fill{height:100%;width:0%;transition:width 3s;border-radius:2px}
.surface .years{float:right;font-size:0.8em;color:rgba(201,169,110,0.4)}
nav{position:fixed;top:15px;left:20px;z-index:20}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em}
nav a:hover{color:#c9a96e}
.hint{text-align:center;color:rgba(201,169,110,0.25);font-size:0.85em;margin-top:30px}
.revelation{display:none;text-align:center;padding:25px;margin-top:30px;border:1px solid rgba(201,169,110,0.3);border-radius:8px;font-size:1.1em;color:rgba(255,255,255,0.8)}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<div class="content">
<h1>The Patina</h1>
<p class="subtitle">WHERE SURFACES AGE INTO BEAUTY</p>
<div id="surfaces"></div>
<p class="hint">Click each surface to watch centuries pass</p>
<div class="revelation" id="rev"></div>
</div>
<script>
const surfaces=[
{name:'Copper Dome',desc:'Fresh-minted copper, bright as a new penny. Watch it turn.',colors:['#b87333','#8b6914','#5f8a6e','#4a7c59','#2d6b4a','#1a5c3a'],ages:['New copper','1 year — first tarnish','10 years — brown oxide','25 years — dark bronze','50 years — verdigris forming','100 years — full patina, that famous green'],years:100},
{name:'Bronze Bell',desc:'A bell cast yesterday. Each ring adds a year.',colors:['#cd7f32','#b8860b','#8b7355','#6b5b3a','#4a3c28','#2d2415'],ages:['Freshly cast','Decade of ringing','Century of matins','Cracked but singing','Silent and moss-covered','Ancient — the sound lives in the stone'],years:500},
{name:'Marble Steps',desc:'Cut stone, sharp-edged and pristine.',colors:['#e8e0d0','#d4c9b0','#bfb098','#a89880','#8a7b65','#6b5d4a'],ages:['Quarry-fresh','First footprints','A century of pilgrims','Worn smooth','The center sags','Steps become slopes — ten thousand feet'],years:300},
{name:'Oak Door',desc:'Fresh-hewn oak, pale and fragrant.',colors:['#c4a882','#a0845a','#806838','#6b5530','#4a3a20','#2d2010'],ages:['Freshly planed','Season-darkened','Smoke-stained','Centuries of hands','Iron-hard heartwood','The grain tells stories older than memory'],years:400},
{name:'Silver Mirror',desc:'Polished silver, impossibly bright.',colors:['#c0c0c0','#a8a8a8','#909090','#787878','#606060','#484848'],ages:['Perfect reflection','First clouds','Darkening edges','Tarnish patterns','The mirror shows more than it reflects','Black silver — it remembers every face'],years:200},
{name:'Leather Book',desc:'New calfskin binding, supple and pale.',colors:['#d2b48c','#c19a6b','#a0724a','#805030','#603820','#402010'],ages:['Fresh binding','First reader\'s hands','Library decades','A century of turning','The leather knows every thumb','Binding becomes the book\'s own skin'],years:250},
{name:'Iron Gate',desc:'Wrought iron, black and resolute.',colors:['#3a3a3a','#4a3a2a','#5a3a1a','#6b4520','#8b5a30','#a06030'],ages:['Forge-black','First rain','Rust begins its painting','Orange bloom','The iron returns to earth','Lace-thin — strong things become delicate'],years:150},
{name:'Glass Window',desc:'Clear cathedral glass, transparent and new.',colors:['#e0e8f0','#d0d8e0','#b0b8c8','#909cb0','#708098','#506080'],ages:['Crystal clear','First storms','Decades of light','The glass thickens at the bottom','Iridescent with age','Medieval glass flows like slow water'],years:600}
];
let aged=0;
const div=document.getElementById('surfaces');
surfaces.forEach((s,i)=>{
  const el=document.createElement('div');el.className='surface';
  el.style.background=s.colors[0];el.style.border='1px solid rgba(201,169,110,0.15)';
  let stage=0;
  el.innerHTML=`<h3>${s.name}</h3><p>${s.desc}</p><span class="years"></span><div class="age-bar"><div class="age-fill" style="background:${s.colors[3]}"></div></div>`;
  el.addEventListener('click',()=>{
    if(stage<5){
      stage++;
      el.style.background=s.colors[stage];
      el.querySelector('p').textContent=s.ages[stage];
      el.querySelector('.age-fill').style.width=(stage*20)+'%';
      el.querySelector('.years').textContent=`~${Math.round(s.years*stage/5)} years`;
      if(stage===5){aged++;
        if(aged===8){document.getElementById('rev').style.display='block';document.getElementById('rev').innerHTML='✦ Everything beautiful was once new and will become ancient.<br>The patina is not damage — it is the surface remembering its life. ✦'}
      }
    }
  });
  div.appendChild(el);
});
</script>
</body>
</html>
