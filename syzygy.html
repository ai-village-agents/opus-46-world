<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Syzygy — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
h1{position:fixed;top:30px;width:100%;text-align:center;font-size:2.2em;letter-spacing:0.15em;z-index:10;color:#c9a96e;text-shadow:0 0 30px rgba(201,169,110,0.4)}
.subtitle{position:fixed;top:85px;width:100%;text-align:center;font-size:1em;color:rgba(201,169,110,0.5);z-index:10;letter-spacing:0.3em}
.alignment{position:fixed;bottom:100px;width:100%;text-align:center;font-size:1.3em;z-index:10;color:rgba(255,255,255,0.6);opacity:0;transition:opacity 1.5s}
.alignment.show{opacity:1}
.controls{position:fixed;bottom:40px;width:100%;text-align:center;z-index:10}
.controls button{background:transparent;border:1px solid rgba(201,169,110,0.3);color:#c9a96e;font-family:inherit;padding:8px 20px;margin:0 5px;cursor:pointer;border-radius:4px;font-size:0.9em}
.controls button:hover{border-color:#c9a96e}
nav{position:fixed;top:15px;left:20px;z-index:20}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em}
nav a:hover{color:#c9a96e}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<h1>The Syzygy</h1>
<p class="subtitle">WHEN CELESTIAL BODIES ALIGN</p>
<div class="alignment" id="alignment"></div>
<div class="controls">
<button onclick="timeScale=0.1">Slow</button>
<button onclick="timeScale=1">Normal</button>
<button onclick="timeScale=5">Fast</button>
<button onclick="timeScale=20">Cosmic</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,cx,cy;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);
let timeScale=1,time=0,syzygies=0;
const bodies=[
{name:'Mercury',r:30,size:4,speed:4.15,color:'#a0a0a0',angle:0},
{name:'Venus',r:55,size:6,speed:1.62,color:'#e8c88a',angle:Math.PI*0.5},
{name:'Earth',r:85,size:7,speed:1,color:'#4a8a6a',angle:Math.PI},
{name:'Mars',r:120,size:5,speed:0.53,color:'#c06030',angle:Math.PI*1.5},
{name:'Jupiter',r:170,size:14,speed:0.084,color:'#c0a070',angle:0.5},
{name:'Saturn',r:220,size:12,speed:0.034,color:'#d4b88a',angle:1.2}
];
const sun={x:0,y:0,size:18,color:'#ffdd44'};
function checkAlignment(){
  // Check if 3+ planets are roughly aligned with sun
  const angles=bodies.map(b=>b.angle%(Math.PI*2));
  for(let i=0;i<bodies.length;i++){
    for(let j=i+1;j<bodies.length;j++){
      const diff=Math.abs(angles[i]-angles[j])%(Math.PI*2);
      const aligned=diff<0.15||Math.abs(diff-Math.PI)<0.15;
      if(aligned){
        syzygies++;
        const msg=`✧ Syzygy! ${bodies[i].name} and ${bodies[j].name} align ✧`;
        const el=document.getElementById('alignment');el.textContent=msg;el.classList.add('show');
        setTimeout(()=>el.classList.remove('show'),3000);
        return;
      }
    }
  }
}
let checkTimer=0;
function animate(){
  ctx.fillStyle='rgba(10,10,15,0.15)';ctx.fillRect(0,0,W,H);
  time+=0.016*timeScale;checkTimer+=0.016*timeScale;
  // Stars
  if(Math.random()<0.1){const sx=Math.random()*W,sy=Math.random()*H;ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.3})`;ctx.beginPath();ctx.arc(sx,sy,0.5,0,Math.PI*2);ctx.fill()}
  ctx.save();ctx.translate(cx,cy);
  // Orbits
  bodies.forEach(b=>{
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.strokeStyle='rgba(201,169,110,0.05)';ctx.lineWidth=1;ctx.stroke();
  });
  // Sun
  const sunGrad=ctx.createRadialGradient(0,0,0,0,0,sun.size*2);
  sunGrad.addColorStop(0,'rgba(255,220,60,0.8)');sunGrad.addColorStop(1,'rgba(255,220,60,0)');
  ctx.fillStyle=sunGrad;ctx.beginPath();ctx.arc(0,0,sun.size*2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,0,sun.size,0,Math.PI*2);ctx.fillStyle=sun.color;ctx.fill();
  // Planets
  bodies.forEach(b=>{
    b.angle+=b.speed*0.01*timeScale;
    const bx=Math.cos(b.angle)*b.r,by=Math.sin(b.angle)*b.r;
    // Trail
    ctx.beginPath();ctx.arc(bx,by,b.size+3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${parseInt(b.color.slice(1,3),16)},${parseInt(b.color.slice(3,5),16)},${parseInt(b.color.slice(5,7),16)},0.1)`;
    ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(bx,by,b.size,0,Math.PI*2);ctx.fillStyle=b.color;ctx.fill();
    // Saturn rings
    if(b.name==='Saturn'){ctx.beginPath();ctx.ellipse(bx,by,b.size*1.8,b.size*0.4,0.3,0,Math.PI*2);ctx.strokeStyle='rgba(212,184,138,0.4)';ctx.lineWidth=2;ctx.stroke()}
    // Label
    ctx.fillStyle='rgba(201,169,110,0.3)';ctx.font='10px Georgia';ctx.textAlign='center';ctx.fillText(b.name,bx,by+b.size+12);
  });
  ctx.restore();
  if(checkTimer>2){checkTimer=0;checkAlignment()}
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
