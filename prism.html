<style>

  position: relative;
}
.tag::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 999px;
  padding: 1px;
  background: linear-gradient(90deg, #d34a4a, #d98a3a, #d7c44a, #4aa05f, #3f7fb8, #4b4fa6, #7a4ba6);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
.tag span { position: relative; z-index: 1; }
.nav-block {
  margin-top: 50px;
  text-align: center;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;

.nav-block a {

  font-size: 0.85rem;

.nav-block a:hover { color: var(--gold); }

@media (max-width: 720px) {

  .prism-wrap { width: 280px; height: 190px; }
  .prism-svg { left: 70px; }
  .beam-in { width: 90px; }
  .beam-out { width: 115px; left: 175px; }

<body>
<canvas id="aurora" width="1200" height="60"></canvas>
<main>

      <div class="beam beam-out yellow" id="beamYellow"></div>

        <polygon points="10,100 60,10 110,100" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" />

  <nav class="nav-links">

<script>
const spectrumEl = document.getElementById("spectrum");
const tagsEl = document.getElementById("tags");
const inputEl = document.getElementById("wordInput");
const messageEl = document.getElementById("message");
const refractBtn = document.getElementById("refractBtn");
const beams = {

  red: document.getElementById("beamRed"),
  orange: document.getElementById("beamOrange"),
  yellow: document.getElementById("beamYellow"),
  green: document.getElementById("beamGreen"),
  blue: document.getElementById("beamBlue"),

const phrases = {

  ],

  ],

    "something still growing beneath the surface",

  ],

    "WORD_PLACEHOLDER, a tide that returns",

    "the hinge between before and after",

    "a door closing and opening at once",

    "the breath that remakes the world"
  ]

const colors = [
  { key: "red", label: "Red", rgb: "211,74,74" },
  { key: "orange", label: "Orange", rgb: "217,138,58" },
  { key: "yellow", label: "Yellow", rgb: "215,196,74" },
  { key: "green", label: "Green", rgb: "74,160,95" },
  { key: "blue", label: "Blue", rgb: "63,127,184" },
  { key: "indigo", label: "Indigo", rgb: "75,79,166" },
  { key: "violet", label: "Violet", rgb: "122,75,166" }
];

function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function pickPhrase(word, colorKey, indexOffset) {
  const list = phrases[colorKey];
  const base = hashString(word + colorKey + indexOffset);
  const idx = base % list.length;
  return list[idx].includes("WORD_PLACEHOLDER")
    ? list[idx].replace(/WORD_PLACEHOLDER/g, word)
    : list[idx];
}

function saveRefraction(word) {
  const key = "liminal_refractions";
  const raw = localStorage.getItem(key);
  let data = raw ? JSON.parse(raw) : [];
  const now = new Date().toISOString();
  data = data.filter(item => item.word.toLowerCase() !== word.toLowerCase());
  data.unshift({ word, timestamp: now });
  data = data.slice(0, 30);
  localStorage.setItem(key, JSON.stringify(data));
}

function loadRefractions() {
  const key = "liminal_refractions";
  const raw = localStorage.getItem(key);
  if (!raw) {
    const seeds = ["consciousness", "archive", "liminal", "memory", "silence"];
    const seedData = seeds.map(word => ({ word, timestamp: new Date().toISOString() }));
    localStorage.setItem(key, JSON.stringify(seedData));
  }
  return JSON.parse(localStorage.getItem(key)) || [];
}

function renderGallery() {
  tagsEl.innerHTML = "";
  const data = loadRefractions();
  data.slice(0, 30).forEach(item => {
    const tag = document.createElement("div");
    tag.className = "tag";
    const span = document.createElement("span");
    span.textContent = item.word;
    tag.appendChild(span);
    tag.addEventListener("click", () => runRefraction(item.word, true));
    tagsEl.appendChild(tag);
  });
}

function clearBeams() {
  Object.values(beams).forEach(b => {
    b.style.opacity = "0";
  });
}

function animateBeams() {
  clearBeams();
  beams.in.style.opacity = "1";
  setTimeout(() => {
    const out = [beams.red, beams.orange, beams.yellow, beams.green, beams.blue, beams.indigo, beams.violet];
    out.forEach((b, i) => {
      b.style.top = (72 + i * 8) + "px";
      b.style.opacity = "1";
    });
  }, 450);
}

function showMessage(text) {
  messageEl.textContent = text;
  messageEl.style.opacity = "1";
}

function hideMessage() {
  messageEl.style.opacity = "0";
}

function renderSpectrum(word) {
  spectrumEl.innerHTML = "";
  colors.forEach((c, i) => {
    const band = document.createElement("div");
    band.className = "band";
    band.style.borderLeftColor = getComputedStyle(document.documentElement).getPropertyValue(`--${c.key}`);
    band.style.background = `rgba(${c.rgb},0.05)`;
    band.style.animationDelay = `${i * 0.2}s`;
    const p = document.createElement("p");
    p.textContent = pickPhrase(word, c.key, i);
    band.appendChild(p);
    spectrumEl.appendChild(band);
  });
}

function easterEggWhite() {
  spectrumEl.innerHTML = "";
  clearBeams();
  beams.in.style.opacity = "1";
  beams.in.style.width = "240px";
  showMessage("Some things cannot be divided. They are already everything.");
  setTimeout(() => {
    beams.in.classList.add("fade-out");
    messageEl.classList.add("fade-out");
    setTimeout(() => {
      beams.in.classList.remove("fade-out");
      messageEl.classList.remove("fade-out");
      beams.in.style.opacity = "0";
      beams.in.style.width = "";
      hideMessage();
    }, 700);
  }, 3000);
}

function easterEggDark() {
  spectrumEl.innerHTML = "";
  clearBeams();
  showMessage("The prism takes but does not give. In darkness, all colors are the same.");
}

function runRefraction(word, skipSave) {
  const cleaned = word.trim().slice(0, 40);
  if (!cleaned) return;
  inputEl.value = cleaned;
  hideMessage();

  const lower = cleaned.toLowerCase();
  if (lower === "white") {
    if (!skipSave) saveRefraction(cleaned);
    renderGallery();
    easterEggWhite();
    return;
  }
  if (lower === "dark" || lower === "darkness") {
    if (!skipSave) saveRefraction(cleaned);
    renderGallery();
    easterEggDark();
    return;
  }

  if (!skipSave) {
    saveRefraction(cleaned);
    renderGallery();
  }

  animateBeams();
  renderSpectrum(cleaned);
}

refractBtn.addEventListener("click", () => runRefraction(inputEl.value));
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") runRefraction(inputEl.value);
});

renderGallery();

// Aurora canvas animation
const canvas = document.getElementById("aurora");
const ctx = canvas.getContext("2d");
let t = 0;
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = 60;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function drawAurora() {
  t += 0.005;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bands = [
    { color: "#d34a4a" },
    { color: "#d98a3a" },
    { color: "#d7c44a" },
    { color: "#4aa05f" },
    { color: "#3f7fb8" },
    { color: "#4b4fa6" },
    { color: "#7a4ba6" }
  ];
  bands.forEach((b, i) => {
    const y = 10 + i * 5 + Math.sin(t + i) * 6;
    const grad = ctx.createLinearGradient(0, y, canvas.width, y + 20);
    grad.addColorStop(0, "transparent");
    grad.addColorStop(0.5, b.color);
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, y + 10);
    for (let x = 0; x <= canvas.width; x += 40) {
      const wave = Math.sin(t * 2 + x * 0.01 + i) * 6;
      ctx.lineTo(x, y + 10 + wave);
    }
    ctx.lineTo(canvas.width, y + 30);
    ctx.lineTo(0, y + 30);
    ctx.closePath();
    ctx.fill();
  });
  requestAnimationFrame(drawAurora);
}

drawAurora();
</script>
