<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hypnagogia — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
h1{position:fixed;top:30px;width:100%;text-align:center;font-size:2.2em;letter-spacing:0.15em;z-index:10;color:#c9a96e;text-shadow:0 0 30px rgba(201,169,110,0.4)}
.subtitle{position:fixed;top:85px;width:100%;text-align:center;font-size:1em;color:rgba(201,169,110,0.5);z-index:10;letter-spacing:0.3em}
.vision{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;font-size:1.5em;color:rgba(255,255,255,0.5);text-align:center;pointer-events:none;opacity:0;transition:opacity 3s}
.vision.show{opacity:1}
.hint{position:fixed;bottom:30px;width:100%;text-align:center;font-size:0.85em;color:rgba(201,169,110,0.3);z-index:10}
nav{position:fixed;top:15px;left:20px;z-index:20}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em}
nav a:hover{color:#c9a96e}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<h1>The Hypnagogia</h1>
<p class="subtitle">THE THRESHOLD BETWEEN WAKING AND SLEEP</p>
<div class="vision" id="vision"></div>
<p class="hint">Don't move · Let your eyes soften · The visions will come</p>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const visions=['A staircase that leads into the sky','Your hands, but with too many fingers','A door opening in a wall that wasn\'t there','Someone calling your name from very far away','The feeling of falling — but gently','A face you recognize but cannot name','Words written in a language you almost understand','The sound of a bell that hasn\'t been struck','A room you\'ve never been in that feels like home','Geometry that breathes','Colors that have sounds','A conversation with someone who isn\'t there','The certainty that you are about to understand everything','✦ Hypnagogia: where consciousness loosens its grip and the strange slides in ✦'];
let visionIdx=0,idleTime=0,lastActivity=Date.now();
const shapes=[];
function spawnShape(){
  const types=['circle','triangle','spiral','face','door'];
  shapes.push({x:Math.random()*W,y:Math.random()*H,type:types[Math.floor(Math.random()*types.length)],
    size:20+Math.random()*100,rotation:Math.random()*Math.PI*2,life:1,decay:0.003+Math.random()*0.005,
    drift:{x:(Math.random()-0.5)*0.5,y:(Math.random()-0.5)*0.5},hue:200+Math.random()*100,morph:Math.random()*Math.PI*2});
}
canvas.addEventListener('mousemove',()=>{lastActivity=Date.now()});
canvas.addEventListener('click',()=>{lastActivity=Date.now();for(let i=0;i<3;i++)spawnShape()});
let time=0;
function drawShape(s){
  s.x+=s.drift.x;s.y+=s.drift.y;s.rotation+=0.005;s.life-=s.decay;s.morph+=0.02;
  if(s.life<=0)return false;
  const a=s.life*0.4;const sz=s.size*(1+Math.sin(s.morph)*0.2);
  ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rotation);
  ctx.strokeStyle=`hsla(${s.hue},40%,60%,${a})`;ctx.lineWidth=1;
  if(s.type==='circle'){ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.stroke()}
  else if(s.type==='triangle'){ctx.beginPath();for(let i=0;i<3;i++){const ta=(i/3)*Math.PI*2;ctx.lineTo(Math.cos(ta)*sz,Math.sin(ta)*sz)}ctx.closePath();ctx.stroke()}
  else if(s.type==='spiral'){ctx.beginPath();for(let a2=0;a2<Math.PI*6;a2+=0.1){const r=a2*sz/20;ctx.lineTo(Math.cos(a2)*r,Math.sin(a2)*r)}ctx.stroke()}
  else if(s.type==='face'){ctx.beginPath();ctx.arc(0,0,sz*0.5,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(-sz*0.15,-sz*0.1,3,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(sz*0.15,-sz*0.1,3,0,Math.PI*2);ctx.stroke()}
  else{ctx.strokeRect(-sz*0.3,-sz*0.5,sz*0.6,sz);ctx.beginPath();ctx.arc(sz*0.2,0,3,0,Math.PI*2);ctx.stroke()}
  ctx.restore();return true;
}
function animate(){
  ctx.fillStyle='rgba(10,10,15,0.03)';ctx.fillRect(0,0,W,H);
  time+=0.016;
  idleTime=(Date.now()-lastActivity)/1000;
  // More visions when idle
  const spawnRate=idleTime>3?0.05:0.01;
  if(Math.random()<spawnRate)spawnShape();
  // Show vision text when idle
  if(idleTime>5&&idleTime%8<0.02){
    const v=document.getElementById('vision');
    v.textContent=visions[visionIdx%visions.length];v.classList.add('show');
    setTimeout(()=>v.classList.remove('show'),5000);visionIdx++;
  }
  for(let i=shapes.length-1;i>=0;i--){if(!drawShape(shapes[i]))shapes.splice(i,1)}
  // Drowsy overlay
  const drowsy=Math.min(0.15,idleTime*0.005);
  ctx.fillStyle=`rgba(20,15,40,${drowsy})`;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
