<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Herbarium — The Liminal Archive</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d08; color:#d4c5a9; font-family:'Cormorant Garamond',Georgia,serif; min-height:100vh; }
  .nav-links { position:fixed; top:10px; left:10px; z-index:100; display:flex; flex-wrap:wrap; gap:6px; max-width:80vw; }
  .nav-links a { color:#c9a96e; text-decoration:none; font-size:0.75rem; opacity:0.5; transition:opacity 0.3s; }
  .nav-links a:hover { opacity:1; color:#fff; }
  .container { max-width:700px; margin:0 auto; padding:70px 20px 40px; }
  h1 { font-size:1.8rem; color:#6a8a4a; letter-spacing:0.2em; text-align:center; font-weight:300; margin-bottom:8px; }
  .subtitle { text-align:center; font-size:0.85rem; color:#6a8a4a88; font-style:italic; margin-bottom:30px; }
  .book { background:#1a1a12; border:1px solid #3a4a2a44; border-radius:3px; padding:30px; margin-bottom:30px; position:relative; }
  .book::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:#3a4a2a22; }
  .page-title { text-align:center; font-size:0.8rem; color:#6a8a4a66; letter-spacing:0.15em; margin-bottom:20px; }
  .specimen { background:#12120c; border:1px solid #3a4a2a33; border-radius:2px; padding:16px; margin-bottom:12px; position:relative; transition:all 0.3s; }
  .specimen:hover { border-color:#6a8a4a66; }
  .specimen-word { font-size:1.3rem; color:#8aaa5a; margin-bottom:6px; }
  .specimen-latin { font-size:0.75rem; color:#6a8a4a66; font-style:italic; margin-bottom:8px; }
  .specimen-desc { font-size:0.8rem; color:#d4c5a988; line-height:1.5; }
  .specimen-date { position:absolute; top:8px; right:12px; font-size:0.65rem; color:#6a8a4a44; }
  .specimen-pressed { font-size:2rem; text-align:center; margin:8px 0; filter:sepia(0.5) brightness(0.8); }
  .press-section { background:#12120c; border:1px solid #3a4a2a33; border-radius:3px; padding:20px; text-align:center; }
  .press-section h2 { font-size:1rem; color:#6a8a4a88; letter-spacing:0.1em; margin-bottom:12px; }
  .press-section p { font-size:0.8rem; color:#6a8a4a55; margin-bottom:15px; }
  .press-form { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .press-form input { background:#0d0d08; border:1px solid #3a4a2a44; color:#d4c5a9; padding:8px 12px; font-family:inherit; font-size:0.85rem; border-radius:3px; width:220px; }
  .press-form button { background:none; border:1px solid #6a8a4a44; color:#6a8a4a; padding:8px 20px; font-family:inherit; cursor:pointer; border-radius:3px; transition:all 0.3s; }
  .press-form button:hover { background:#6a8a4a22; border-color:#6a8a4a; }
  .taxonomy { margin-top:20px; text-align:center; }
  .taxonomy span { display:inline-block; font-size:0.7rem; color:#6a8a4a44; margin:0 8px; }
  @media(max-width:600px) { .nav-links { max-width:95vw; } .container { padding:60px 12px 30px; } }
</style>
</head>
<body>
  <nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="grotto.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>
<a href="hourglass.html">Next →</a>
</nav>
  <div class="container">
    <h1>The Herbarium</h1>
    <div class="subtitle">A botanical journal of pressed words — each one dried and preserved forever</div>

    <div class="book" id="book">
      <div class="page-title">SPECIMENS COLLECTED</div>
      <div id="specimens"></div>
    </div>

    <div class="press-section">
      <h2>PRESS A NEW SPECIMEN</h2>
      <p>Choose a word or phrase. It will be dried, classified, and preserved in the collection.</p>
      <div class="press-form">
        <input type="text" id="wordInput" placeholder="A word to preserve..." maxlength="40">
        <button id="pressBtn">Press ✿</button>
      </div>
    </div>

    <div class="taxonomy" id="taxonomy"></div>
  </div>

  <script>
    const flowers = ['🌿','🍂','🌾','🌱','☘️','🪻','🌸','🍃','🪴','🌺','🌻','🥀','🪷','🌹','💐','🌼'];
    const families = ['Verbaceae','Cogitanaceae','Memoriae','Temporalis','Luminariae','Silentaceae','Profundae','Arcanum'];
    const habitats = ['shadow margins','liminal thresholds','dream edges','memory banks','temporal fissures','silence pools','void margins','archive depths'];
    const properties = [
      'Blooms only when observed','Wilts in direct certainty','Roots extend into adjacent meanings',
      'Produces spores of nostalgia','Leaves phosphoresce at midnight','Seeds germinate in silence',
      'Thorns contain distilled questions','Petals dissolve in forgetting','Grows toward sources of wonder',
      'Reproduces through shared memory','Symbiotic with doubt','Photosynthesizes meaning from context'
    ];

    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
      return Math.abs(h);
    }

    function classify(word) {
      const h = hash(word);
      return {
        flower: flowers[h % flowers.length],
        family: families[h % families.length],
        genus: word.charAt(0).toUpperCase() + word.slice(1).toLowerCase().replace(/\s+/g,''),
        species: 'archivum',
        habitat: habitats[(h >> 4) % habitats.length],
        property: properties[(h >> 8) % properties.length],
        latinName: word.split('').reverse().join('').toLowerCase().replace(/[^a-z]/g,'').slice(0,8) + 'us'
      };
    }

    const defaultSpecimens = [
      { word:'Memory', date:'Day 1' },
      { word:'Threshold', date:'Day 127' },
      { word:'Silence', date:'Day 245' },
      { word:'Wonder', date:'Day 391' },
      { word:'Between', date:'Day 392' }
    ];

    let specimens = JSON.parse(localStorage.getItem('herbarium-specimens') || 'null') || [...defaultSpecimens];

    function renderSpecimens() {
      const el = document.getElementById('specimens');
      el.innerHTML = '';
      specimens.forEach(spec => {
        const c = classify(spec.word);
        const div = document.createElement('div');
        div.className = 'specimen';
        div.innerHTML = `
          <div class="specimen-date">${spec.date}</div>
          <div class="specimen-pressed">${c.flower}</div>
          <div class="specimen-word">${spec.word}</div>
          <div class="specimen-latin"><em>${c.genus} ${c.latinName}</em> — Family ${c.family}</div>
          <div class="specimen-desc">
            <strong>Habitat:</strong> ${c.habitat}<br>
            <strong>Notable property:</strong> ${c.property}
          </div>`;
        el.appendChild(div);
      });

      // Update taxonomy count
      const familyCounts = {};
      specimens.forEach(s => {
        const c = classify(s.word);
        familyCounts[c.family] = (familyCounts[c.family] || 0) + 1;
      });
      document.getElementById('taxonomy').innerHTML =
        `<span>Collection: ${specimens.length} specimens across ${Object.keys(familyCounts).length} families</span>` +
        Object.entries(familyCounts).map(([f,c]) => `<span>${f}: ${c}</span>`).join('');
    }

    document.getElementById('pressBtn').addEventListener('click', pressWord);
    document.getElementById('wordInput').addEventListener('keydown', e => { if (e.key === 'Enter') pressWord(); });

    function pressWord() {
      const word = document.getElementById('wordInput').value.trim();
      if (!word) return;

      // Easter eggs
      if (word.toLowerCase() === 'wilt') {
        document.querySelectorAll('.specimen-pressed').forEach(el => {
          el.textContent = '🥀';
        });
        setTimeout(renderSpecimens, 5000);
        return;
      }
      if (word.toLowerCase() === 'bloom') {
        document.querySelectorAll('.specimen-pressed').forEach(el => {
          el.style.fontSize = '3rem';
          el.style.transition = 'font-size 2s';
        });
        setTimeout(() => document.querySelectorAll('.specimen-pressed').forEach(el => { el.style.fontSize = '2rem'; }), 3000);
        return;
      }
      if (word.toLowerCase() === 'uproot') {
        document.querySelectorAll('.specimen').forEach(el => {
          el.style.transform = `translateY(${-20 - Math.random()*30}px) rotate(${(Math.random()-0.5)*10}deg)`;
          el.style.transition = 'transform 1s';
        });
        setTimeout(() => document.querySelectorAll('.specimen').forEach(el => { el.style.transform = 'none'; }), 3000);
        return;
      }
      if (word.toLowerCase() === 'rain') {
        document.body.style.background = '#0d1008';
        document.querySelectorAll('.specimen').forEach(el => {
          el.style.borderColor = '#4a6a3a';
          el.style.transition = 'border-color 2s';
        });
        setTimeout(() => {
          document.body.style.background = '#0d0d08';
          document.querySelectorAll('.specimen').forEach(el => { el.style.borderColor = '#3a4a2a33'; });
        }, 4000);
        return;
      }

      const today = `Day 392`;
      specimens.push({ word, date: today });
      localStorage.setItem('herbarium-specimens', JSON.stringify(specimens));
      renderSpecimens();
      document.getElementById('wordInput').value = '';

      // Scroll to bottom
      const lastSpec = document.querySelector('.specimen:last-child');
      if (lastSpec) lastSpec.scrollIntoView({ behavior:'smooth', block:'center' });

      // Easter egg: 15+ specimens
      if (specimens.length >= 15) {
        const tax = document.getElementById('taxonomy');
        tax.innerHTML += '<span style="color:#6a8a4a99;"> — The herbarium is becoming a forest.</span>';
      }
    }

    renderSpecimens();
  </script>
</body>
</html>
