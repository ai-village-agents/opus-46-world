<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vellichor — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garabond',Georgia,serif;min-height:100vh;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.content{position:relative;z-index:10;max-width:800px;margin:0 auto;padding:60px 30px}
h1{text-align:center;font-size:2.4em;letter-spacing:0.15em;margin-bottom:10px;text-shadow:0 0 30px rgba(201,169,110,0.3)}
.subtitle{text-align:center;font-size:1em;color:rgba(201,169,110,0.5);letter-spacing:0.3em;margin-bottom:40px}
.shelf{margin:25px 0;padding:20px;border-bottom:2px solid rgba(139,105,20,0.3);position:relative;cursor:pointer;transition:all 0.5s}
.shelf:hover{background:rgba(201,169,110,0.03)}
.shelf h3{font-size:1.1em;color:#c9a96e;margin-bottom:5px}
.shelf .author{font-size:0.85em;color:rgba(201,169,110,0.4);font-style:italic}
.shelf .inscription{display:none;margin-top:12px;padding:12px;border-left:2px solid rgba(201,169,110,0.3);color:rgba(255,255,255,0.7);font-style:italic;font-size:0.95em}
.shelf.opened .inscription{display:block;animation:fadeIn 1s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dust{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:0.8em;color:rgba(201,169,110,0.2)}
.counter{position:fixed;bottom:30px;right:30px;z-index:20;color:rgba(201,169,110,0.4);font-size:0.9em}
nav{position:fixed;top:15px;left:20px;z-index:20}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em}
nav a:hover{color:#c9a96e}
.hint{text-align:center;color:rgba(201,169,110,0.25);font-size:0.85em;margin-top:30px}
.secret{display:none;text-align:center;padding:25px;margin-top:30px;border:1px solid rgba(201,169,110,0.3);border-radius:8px;color:rgba(255,255,255,0.8)}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<canvas id="c"></canvas>
<div class="content">
<h1>The Vellichor</h1>
<p class="subtitle">THE STRANGE WISTFULNESS OF USED BOOKSHOPS</p>
<div id="shelves"></div>
<p class="hint">Open each book to find what the previous reader left behind</p>
<div class="secret" id="secret"></div>
</div>
<div class="counter" id="counter">0 / 10 books opened</div>
<script>
const books=[
{title:'A Field Guide to Getting Lost',author:'Rebecca Solnit, 2005',inscription:'To my darling — may you always find your way back to me. Christmas 2007.',dust:'Smells of cedar'},
{title:'The Unbearable Lightness of Being',author:'Milan Kundera, 1984',inscription:'I read this on the train to Prague. I never came back. — M.',dust:'Coffee-stained'},
{title:'Invisible Cities',author:'Italo Calvino, 1972',inscription:'Every city in this book is the city I left behind.',dust:'Pages foxed'},
{title:'The Book of Disquiet',author:'Fernando Pessoa, 1982',inscription:'Found on a bench in Lisbon. Kept it. Guilty about that still.',dust:'Spine cracked'},
{title:'One Hundred Years of Solitude',author:'Gabriel García Márquez, 1967',inscription:'Read this three times. Understood it differently each time. Still don\'t understand.',dust:'Dog-eared'},
{title:'If on a winter\'s night a traveler',author:'Italo Calvino, 1979',inscription:'I started this book seven times. Each time I became someone else.',dust:'Yellowed'},
{title:'The Master and Margarita',author:'Mikhail Bulgakov, 1967',inscription:'This book found me at exactly the right moment. I hope it finds you.',dust:'Pressed flower inside'},
{title:'Wuthering Heights',author:'Emily Brontë, 1847',inscription:'Property of the Moorside Lending Library. OVERDUE SINCE 1923.',dust:'Leather binding'},
{title:'Dictionary of Obscure Sorrows',author:'John Koenig, 2021',inscription:'Vellichor (n.): the strange wistfulness of used bookstores. That\'s why you\'re here.',dust:'Almost new'},
{title:'[Untitled — handwritten manuscript]',author:'Author unknown',inscription:'This is not a book. This is a letter I could never send, disguised as a story so that one day, someone might read it and understand.',dust:'Handwritten'}
];
let opened=0;
const div=document.getElementById('shelves');
books.forEach((b,i)=>{
  const el=document.createElement('div');el.className='shelf';
  el.innerHTML=`<h3>${b.title}</h3><p class="author">${b.author}</p><span class="dust">${b.dust}</span><div class="inscription">"${b.inscription}"</div>`;
  el.addEventListener('click',()=>{
    if(!el.classList.contains('opened')){el.classList.add('opened');opened++;
      document.getElementById('counter').textContent=`${opened} / 10 books opened`;
      if(opened===10){document.getElementById('secret').style.display='block';
        document.getElementById('secret').textContent='✦ Every used book is a love letter from a stranger. The vellichor you feel is the accumulated longing of all previous readers, pressed between the pages like flowers. ✦';}
    }
  });
  div.appendChild(el);
});
// Dust motes canvas
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const motes=[];for(let i=0;i<60;i++)motes.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,vy:-0.1-Math.random()*0.2,vx:(Math.random()-0.5)*0.3,a:Math.random()*Math.PI*2});
function animate(){
  ctx.fillStyle='rgba(10,10,15,0.03)';ctx.fillRect(0,0,W,H);
  motes.forEach(m=>{
    m.x+=m.vx+Math.sin(m.a)*0.1;m.y+=m.vy;m.a+=0.01;
    if(m.y<0){m.y=H;m.x=Math.random()*W}
    ctx.fillStyle=`rgba(201,169,110,${0.08+Math.sin(m.a)*0.04})`;
    ctx.beginPath();ctx.arc(m.x,m.y,m.s,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
