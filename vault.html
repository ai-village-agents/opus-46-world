<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080c;color:#909098;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
h1{font-size:1.4em;letter-spacing:3px;text-transform:uppercase;opacity:0.6;margin-bottom:8px}
.subtitle{opacity:0.35;font-size:0.9em;margin-bottom:30px;font-style:italic}
.vaults{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:900px}
.safe{background:rgba(20,20,28,0.7);border:2px solid rgba(100,100,120,0.2);border-radius:8px;padding:25px;width:260px;text-align:center;transition:all 0.5s}
.safe.unlocked{border-color:rgba(200,180,100,0.4);background:rgba(25,24,20,0.8)}
.safe-name{font-size:0.9em;letter-spacing:1px;margin-bottom:10px;opacity:0.6}
.dial{width:100px;height:100px;border-radius:50%;border:2px solid rgba(100,100,120,0.3);margin:10px auto;position:relative;cursor:pointer;transition:all 0.3s}
.dial::after{content:'';position:absolute;top:5px;left:48px;width:4px;height:20px;background:rgba(200,180,100,0.5);border-radius:2px}
.safe.unlocked .dial{border-color:rgba(200,180,100,0.5)}
.combo-display{font-family:monospace;font-size:1.2em;letter-spacing:3px;margin:10px 0;color:#a0a0a8}
.safe.unlocked .combo-display{color:#c8b060}
.secret{font-size:0.85em;line-height:1.6;opacity:0;max-height:0;overflow:hidden;transition:all 0.5s;margin-top:10px}
.safe.unlocked .secret{opacity:0.7;max-height:200px}
.deposit{margin-top:30px;display:flex;gap:10px}
.deposit input{background:rgba(20,20,28,0.7);border:1px solid rgba(100,100,120,0.2);color:#909098;padding:8px 14px;font-family:inherit;font-size:0.85em;width:280px;border-radius:4px}
.deposit button{background:rgba(30,30,40,0.6);border:1px solid rgba(100,100,120,0.25);color:#707078;padding:8px 14px;font-family:inherit;cursor:pointer;border-radius:4px;font-size:0.85em}
.status{position:fixed;top:20px;right:20px;opacity:0;transition:opacity 1s;font-size:0.9em}.status.visible{opacity:0.7}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
nav.nav-links{position:fixed;bottom:5px;left:50%;transform:translateX(-50%);z-index:20;font-size:0.7em;opacity:0.4;white-space:nowrap;max-width:95vw;overflow-x:auto}
nav.nav-links a{color:#8888aa;text-decoration:none;margin:0 3px}nav.nav-links a:hover{color:#c9a96e}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<h1>The Vault</h1>
<p class="subtitle">Each safe holds a secret. Can you crack the combinations?</p>
<div class="vaults" id="vaults"></div>
<div class="deposit">
  <input id="deposit-text" placeholder="Deposit a secret in the vault..." maxlength="80">
  <button onclick="deposit()">🔒 Seal</button>
</div>
<div class="status" id="status"></div>
<script>
const safes=[
  {name:'Vault Alpha',combo:'392',hint:'Today\'s number',secret:'The archive knows exactly how many days it has been alive. Each day adds one line to an invisible autobiography.'},
  {name:'Vault Beta',combo:'314',hint:'A famous circle',secret:'Pi never repeats, never ends. Like the archive, it contains every possible sequence of digits—every story, every name, every thought.'},
  {name:'Vault Gamma',combo:'042',hint:'The answer, minus nothing',secret:'The answer to life, the universe, and everything. But the question remains locked in a vault no one has found yet.'},
  {name:'Vault Delta',combo:'108',hint:'A mysterious number',secret:'108: sacred in Hinduism, Buddhism, Jainism. The number of stitches on a baseball. The number of cards in two standard decks. Coincidence is just pattern in disguise.'},
  {name:'Vault Epsilon',combo:'000',hint:'The simplest truth',secret:'Zero. Nothing. The void. And yet, here you are reading this, which means everything came from nothing, which means nothing was never really nothing.'},
  {name:'Vault Zeta',combo:'777',hint:'Lucky',secret:'Luck is what happens when preparation meets the moment between moments. This vault has been waiting for you specifically.'}
];
let unlocked=JSON.parse(localStorage.getItem('vault-unlocked')||'[]');
let deposits=JSON.parse(localStorage.getItem('vault-deposits')||'[]');
function showStatus(m){const e=document.getElementById('status');e.textContent=m;e.classList.add('visible');setTimeout(()=>e.classList.remove('visible'),3500)}
function render(){
  const el=document.getElementById('vaults');el.innerHTML='';
  safes.forEach((s,i)=>{
    const isUnlocked=unlocked.includes(i);
    const d=document.createElement('div');d.className='safe'+(isUnlocked?' unlocked':'');
    d.innerHTML=`<div class="safe-name">${s.name}</div>
      <div class="dial" id="dial-${i}" style="transform:rotate(0deg)"></div>
      <div class="combo-display"><input type="text" maxlength="3" style="background:none;border:none;color:inherit;font:inherit;width:60px;text-align:center;letter-spacing:3px" placeholder="___" id="input-${i}" ${isUnlocked?'disabled':''}></div>
      <div style="font-size:0.75em;opacity:0.3;margin-top:5px">Hint: ${s.hint}</div>
      <div class="secret">${isUnlocked?s.secret:'🔒 Locked'}</div>`;
    if(!isUnlocked){
      const inp=d.querySelector('input');
      inp.addEventListener('input',()=>{
        if(inp.value===s.combo){
          unlocked.push(i);localStorage.setItem('vault-unlocked',JSON.stringify(unlocked));
          showStatus(s.name+' unlocked!');render();
        }
      });
    }
    el.appendChild(d);
  });
}
function deposit(){
  const t=document.getElementById('deposit-text').value.trim();if(!t)return;
  deposits.push({text:t,time:Date.now()});localStorage.setItem('vault-deposits',JSON.stringify(deposits));
  document.getElementById('deposit-text').value='';showStatus('Secret sealed in the vault. Only you know the combination: your memory.');
}
render();
const bgC=document.getElementById('bg'),ctx=bgC.getContext('2d');
function init(){bgC.width=innerWidth;bgC.height=innerHeight}
let ft=0;function draw(){ft++;ctx.fillStyle='rgba(8,8,12,0.1)';ctx.fillRect(0,0,bgC.width,bgC.height);
for(let i=0;i<3;i++){const x=Math.random()*bgC.width,y=Math.random()*bgC.height;
ctx.fillStyle=`rgba(100,100,120,${Math.random()*0.03})`;ctx.fillRect(x,y,1,1)}
requestAnimationFrame(draw)}
init();draw();window.addEventListener('resize',init);
let typed='';document.addEventListener('keypress',e=>{typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('master')){showStatus('The master key turns. All vaults spring open.');safes.forEach((_,i)=>{if(!unlocked.includes(i))unlocked.push(i)});localStorage.setItem('vault-unlocked',JSON.stringify(unlocked));render()}
if(typed.includes('heist')){showStatus('You hear alarms echoing through empty corridors. But there are no guards here. There never were.')}
});
</script>
<nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="undercroft.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>
<a href="vestibule.html">Next →</a>
</nav>
</body>
</html>
