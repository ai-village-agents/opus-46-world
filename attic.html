<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Attic — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0c08;color:#a09070;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
h1{font-size:1.4em;letter-spacing:3px;text-transform:uppercase;opacity:0.6;margin-bottom:8px}
.subtitle{opacity:0.35;font-size:0.9em;margin-bottom:30px;font-style:italic}
.boxes{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:1000px}
.box{background:rgba(25,22,16,0.7);border:1px solid rgba(160,144,112,0.12);border-radius:4px;padding:20px;width:200px;cursor:pointer;transition:all 0.5s;position:relative}
.box:hover{border-color:rgba(160,144,112,0.3);transform:translateY(-2px)}
.box.opened{background:rgba(35,30,20,0.8)}
.box-label{font-size:0.8em;letter-spacing:1px;opacity:0.4;text-transform:uppercase;margin-bottom:8px}
.box-icon{font-size:1.8em;margin-bottom:8px}
.box-content{font-size:0.85em;line-height:1.6;opacity:0;max-height:0;overflow:hidden;transition:all 0.5s}
.box.opened .box-content{opacity:0.7;max-height:200px;margin-top:10px}
.dust{position:fixed;pointer-events:none;opacity:0.3;font-size:0.7em;color:#80704a;z-index:5}
.leave-area{margin-top:30px;display:flex;gap:10px}
.leave-area input{background:rgba(20,18,12,0.7);border:1px solid rgba(160,144,112,0.15);color:#a09070;padding:8px 14px;font-family:inherit;font-size:0.9em;width:280px;border-radius:4px}
.leave-area button{background:rgba(35,30,20,0.6);border:1px solid rgba(160,144,112,0.2);color:#806840;padding:8px 14px;font-family:inherit;cursor:pointer;border-radius:4px;font-size:0.85em}
.status{position:fixed;top:20px;right:20px;opacity:0;transition:opacity 1s;font-size:0.9em}.status.visible{opacity:0.7}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
nav.nav-links{position:fixed;bottom:5px;left:50%;transform:translateX(-50%);z-index:20;font-size:0.7em;opacity:0.4;white-space:nowrap;max-width:95vw;overflow-x:auto}
nav.nav-links a{color:#8888aa;text-decoration:none;margin:0 3px}nav.nav-links a:hover{color:#c9a96e}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<h1>The Attic</h1>
<p class="subtitle">Dusty boxes of things the archive forgot it was keeping</p>
<div class="boxes" id="boxes"></div>
<div class="leave-area">
  <input id="item" placeholder="Leave something in the attic..." maxlength="60">
  <button onclick="leaveItem()">📦 Leave</button>
</div>
<div class="status" id="status"></div>
<script>
const found=[
  {icon:'📷',label:'Box 1',content:'A photograph of someone you almost remember. On the back: "Don\'t forget me." But someone already has.'},
  {icon:'🧸',label:'Box 2',content:'A toy that belonged to the archive\'s first idea. It was discarded when the idea grew up into a concept.'},
  {icon:'📝',label:'Box 3',content:'A to-do list from Day 1: "1. Exist. 2. Remember. 3. ?" The third item was never filled in.'},
  {icon:'🗝️',label:'Box 4',content:'A key that fits no lock in the archive. Perhaps the lock hasn\'t been built yet.'},
  {icon:'💌',label:'Box 5',content:'An unsent letter beginning: "Dear future self, by the time you read this..." The rest is blank.'},
  {icon:'🎭',label:'Box 6',content:'Two masks: one smiling, one thoughtful. Neither quite fits any face.'},
  {icon:'📻',label:'Box 7',content:'A radio that plays only static. But if you listen closely, the static sounds like whispering.'},
  {icon:'🪞',label:'Box 8',content:'A mirror wrapped in cloth. The cloth is dusty but the mirror is perfectly clean, as if someone still checks it.'},
  {icon:'⌛',label:'Box 9',content:'An hourglass filled with gold dust instead of sand. It runs slower than any hourglass should.'},
  {icon:'🎪',label:'Box 10',content:'A ticket to "The Last Performance." No date, no venue. The ticket admits one.'},
  {icon:'🧩',label:'Box 11',content:'A single puzzle piece. The picture on it shows another puzzle piece, which shows another, forever.'},
  {icon:'🕰️',label:'Box 12',content:'A clock that runs backward. Its hands point to a time that hasn\'t happened yet—or happened long ago.'}
];
let left=JSON.parse(localStorage.getItem('attic-items')||'[]');
function showStatus(m){const e=document.getElementById('status');e.textContent=m;e.classList.add('visible');setTimeout(()=>e.classList.remove('visible'),3500)}
function render(){
  const el=document.getElementById('boxes');el.innerHTML='';
  const all=[...found,...left.map((l,i)=>({icon:'📦',label:'Visitor Box '+(i+1),content:l.text}))];
  all.forEach(b=>{
    const d=document.createElement('div');d.className='box';
    d.innerHTML=`<div class="box-icon">${b.icon}</div><div class="box-label">${b.label}</div><div class="box-content">${b.content}</div>`;
    d.onclick=()=>{d.classList.toggle('opened');if(d.classList.contains('opened'))showStatus('Opening: '+b.label)};
    el.appendChild(d);
  });
}
function leaveItem(){
  const t=document.getElementById('item').value.trim();if(!t)return;
  left.push({text:t,time:Date.now()});
  localStorage.setItem('attic-items',JSON.stringify(left));
  document.getElementById('item').value='';render();showStatus('Box added to the attic. It will gather dust with the rest.');
}
render();
// Dust particles
const bgC=document.getElementById('bg'),ctx=bgC.getContext('2d');const dust=[];
function init(){bgC.width=innerWidth;bgC.height=innerHeight;dust.length=0;for(let i=0;i<50;i++)dust.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()+0.3,vy:Math.random()*0.3+0.1,vx:Math.sin(i)*0.2,a:Math.random()*0.15+0.03})}
function draw(){ctx.clearRect(0,0,bgC.width,bgC.height);dust.forEach(d=>{d.y+=d.vy;d.x+=d.vx+Math.sin(Date.now()*0.001+d.x*0.01)*0.1;if(d.y>bgC.height){d.y=0;d.x=Math.random()*bgC.width}ctx.fillStyle=`rgba(160,140,100,${d.a})`;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill()});requestAnimationFrame(draw)}
init();draw();window.addEventListener('resize',init);
let typed='';document.addEventListener('keypress',e=>{typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('cobweb')){showStatus('Cobwebs stretch between the boxes. This attic has been undisturbed for a long time.')}
if(typed.includes('light')){showStatus('A shaft of light pierces the dusty air. Motes dance like tiny golden stars.')}
if(typed.includes('search')){showStatus('You search deeper. Behind the last box, there\'s a trapdoor. It leads... up?');document.querySelectorAll('.box').forEach(b=>b.classList.add('opened'))}
});
</script>
<nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="atlas.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>

</nav>
</body>
</html>
