    window.addEventListener('keydown', (e) => {
      if (markPromptOpen) {
        if (e.key === 'Escape') {
          e.preventDefault();
          closeMarkPrompt(false);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          confirmMark();
        }
        return;
      }
      ensureAudio();
      if (e.key.toLowerCase() === 'm') {
        e.preventDefault();
        openMarkPrompt();
        return;
      }
      keys.add(e.key.toLowerCase());
      if (e.key === 'Enter') attemptEnter();
    });
    window.addEventListener('keyup', (e) => {
      keys.delete(e.key.toLowerCase());
    });

    function screenToWorld(clientX, clientY) {
      const viewLeft = camera.x - canvas.width / 2;
      const viewTop = camera.y - canvas.height / 2;
      return { x: clientX + viewLeft, y: clientY + viewTop };
    }

    function setMoveTarget(x, y) {
      moveTarget = { x, y, createdAt: performance.now() };
      clickRings.push({ x, y, createdAt: moveTarget.createdAt });
    }

    canvas.addEventListener('click', (e) => {
      ensureAudio();
      const isNearChamber = nearestIndex !== -1 &&
        dist(player.x, player.y, chambers[nearestIndex].x, chambers[nearestIndex].y) <= 80;
      if (isNearChamber) {
        window.location.href = chambers[nearestIndex].file;
        return;
      }
      const world = screenToWorld(e.clientX, e.clientY);
      setMoveTarget(world.x, world.y);
    });

    canvas.addEventListener('touchstart', (e) => {
      if (!e.touches.length) return;
      e.preventDefault();
      ensureAudio();
      const touch = e.touches[0];
      const world = screenToWorld(touch.clientX, touch.clientY);
      setMoveTarget(world.x, world.y);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!e.touches.length) return;
      e.preventDefault();
      const touch = e.touches[0];
      const world = screenToWorld(touch.clientX, touch.clientY);
      moveTarget = { x: world.x, y: world.y, createdAt: moveTarget ? moveTarget.createdAt : performance.now() };
    }, { passive: false });

    function attemptEnter() {
      if (nearestIndex !== -1) {
        const c = chambers[nearestIndex];
        if (dist(player.x, player.y, c.x, c.y) <= 80) {
          window.location.href = c.file;
        }
      }
    }

    function dist(x1, y1, x2, y2) {
      const dx = x1 - x2;
      const dy = y1 - y2;
      return Math.hypot(dx, dy);
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function randRange(min, max) { return min + Math.random() * (max - min); }

    function ensureAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = muted ? 0 : 1;
        masterGain.connect(audioCtx.destination);

        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc2.type = 'sine';
        osc1.frequency.value = 55;
        osc2.frequency.value = 82.5;

        const gain1 = audioCtx.createGain();
        const gain2 = audioCtx.createGain();
        gain1.gain.value = 0.015;
        gain2.gain.value = 0.01;

        osc1.connect(gain1);
        osc2.connect(gain2);
        gain1.connect(masterGain);
        gain2.connect(masterGain);
        osc1.start();
        osc2.start();
        audioStarted = true;
      }

      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function updateMuteButton() {
      muteBtn.textContent = muted ? '♪̸' : '♪';
    }

    muteBtn.addEventListener('click', () => {
      ensureAudio();
      muted = !muted;
      if (masterGain) {
        masterGain.gain.value = muted ? 0 : 1;
      }
      localStorage.setItem('liminal-muted', muted ? 'true' : 'false');
      updateMuteButton();
    });
    updateMuteButton();

    markInput.addEventListener('keydown', (e) => {
      e.stopPropagation();
      if (e.key === 'Enter') {
        e.preventDefault();
        confirmMark();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeMarkPrompt(false);
      }
    });

    function openMarkPrompt() {
      markPromptOpen = true;
      markPrompt.classList.add('active');
      markInput.value = '';
      keys.clear();
      moveTarget = null;
      markInput.focus();
    }

    function closeMarkPrompt(save) {
      markPromptOpen = false;
      markPrompt.classList.remove('active');
      if (save) {
        markInput.blur();
      } else {
        markInput.blur();
      }
    }

    function confirmMark() {
      const text = markInput.value.trim();
      if (!text) {
        closeMarkPrompt(false);
        return;
      }
      const mark = { x: player.x, y: player.y, text, timestamp: Date.now() };
      marks.push(mark);
      while (marks.length > 50) marks.shift();
      localStorage.setItem('liminal-marks', JSON.stringify(marks));
      closeMarkPrompt(true);
    }

    function persistTrailRead() {
      const payload = {};
      trailRead.forEach((set, index) => {
        if (set.size) {
          payload[index] = [...set].sort((a, b) => a - b);
        }
      });
      localStorage.setItem('liminal-trails-read', JSON.stringify(payload));
    }

    function advanceIntro(time) {
      if (introPhase === 'done') return;
      const elapsed = time - introStart;
      const durations = {
        black: 500,
        text1in: 1500,
        text1hold: 1500,
        text1out: 1000,
        text2in: 1000,
        text2hold: 1000,
        text2out: 500,
        worldin: 1000
      };
      if (elapsed < durations[introPhase]) return;
      introStart = time;
      switch (introPhase) {
        case 'black':
          introPhase = 'text1in';
          break;
        case 'text1in':
          introPhase = 'text1hold';
          break;
        case 'text1hold':
          introPhase = 'text1out';
          break;
        case 'text1out':
          introPhase = 'text2in';
          break;
        case 'text2in':
          introPhase = 'text2hold';
          break;
        case 'text2hold':
          introPhase = 'text2out';
          break;
        case 'text2out':
          introPhase = 'worldin';
          break;
        case 'worldin':
          introPhase = 'done';
          localStorage.setItem('liminal-intro-seen', 'true');
          break;
        default:
          introPhase = 'done';
      }
    }

    function drawIntroText(text, alpha) {
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.font = '20px "Cormorant Garamond", Georgia, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function drawIntro(time) {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const elapsed = time - introStart;
      const phases = {
        text1in: 1500,
        text1hold: 1500,
        text1out: 1000,
        text2in: 1000,
        text2hold: 1000,
        text2out: 500,
        worldin: 1000
      };

      if (introPhase === 'text1in') {
        drawIntroText('You are a point of light', clamp(elapsed / phases.text1in, 0, 1));
      } else if (introPhase === 'text1hold') {
        drawIntroText('You are a point of light', 1);
      } else if (introPhase === 'text1out') {
        drawIntroText('You are a point of light', clamp(1 - elapsed / phases.text1out, 0, 1));
      } else if (introPhase === 'text2in') {
        drawIntroText('drifting through the spaces between', clamp(elapsed / phases.text2in, 0, 1));
      } else if (introPhase === 'text2hold') {
        drawIntroText('drifting through the spaces between', 1);
      } else if (introPhase === 'text2out') {
        drawIntroText('drifting through the spaces between', clamp(1 - elapsed / phases.text2out, 0, 1));
      } else if (introPhase === 'worldin') {
        const alpha = clamp(elapsed / phases.worldin, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        drawWorld(time);
        ctx.restore();
      }
    }

    function scheduleAtmosphericEvent(now) {
      nextEventTime = now + randRange(8000, 15000);
    }

    function triggerAtmosphericEvent(now) {
      const roll = Math.random();
      if (roll < 0.34) {
        const startX = Math.random() * canvas.width;
        const startY = Math.random() * canvas.height;
        const length = randRange(120, 240);
        const angle = randRange(-Math.PI / 6, Math.PI / 6) + (Math.random() < 0.5 ? Math.PI : 0);
        atmosphericEvents.push({
          type: 'shooting',
          startTime: now,
          duration: 500,
          startX,
          startY,
          endX: startX + Math.cos(angle) * length,
          endY: startY + Math.sin(angle) * length
        });
      } else if (roll < 0.67) {
        const angle = Math.random() * Math.PI * 2;
        const radius = randRange(100, 800);
        const gx = clamp(player.x + Math.cos(angle) * radius, 0, WORLD.w);
        const gy = clamp(player.y + Math.sin(angle) * radius, 0, WORLD.h);
        const colors = ['#4a3a7a', '#3a5a7a', '#7a5a3a', '#3a7a5a'];
        atmosphericEvents.push({
          type: 'glow',
          startTime: now,
          duration: 3000,
          x: gx,
          y: gy,
          radius: randRange(100, 200),
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      } else {
        flickerUntil = now + 300;
      }
      scheduleAtmosphericEvent(now);
    }

    function update(dt, time) {
      const accel = player.speed;
      let ax = 0, ay = 0;
      if (!markPromptOpen) {
        if (keys.has('w') || keys.has('arrowup')) ay -= accel;
        if (keys.has('s') || keys.has('arrowdown')) ay += accel;
        if (keys.has('a') || keys.has('arrowleft')) ax -= accel;
        if (keys.has('d') || keys.has('arrowright')) ax += accel;
      }

      const hasInput = ax !== 0 || ay !== 0;
      if (hasInput && moveTarget) {
        moveTarget = null;
      }

      if (moveTarget && !hasInput) {
        const dx = moveTarget.x - player.x;
        const dy = moveTarget.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d <= 5) {
          moveTarget = null;
        } else if (d > 0) {
          player.vx = (dx / d) * player.speed;
          player.vy = (dy / d) * player.speed;
        }
      } else {
        player.vx += ax;
        player.vy += ay;
        player.vx *= player.friction;
        player.vy *= player.friction;
      }

      player.x += player.vx;
      player.y += player.vy;
      player.x = clamp(player.x, 0, WORLD.w);
      player.y = clamp(player.y, 0, WORLD.h);

      frameCount += 1;
      if (frameCount % 3 === 0) {
        playerTrail.push({ x: player.x, y: player.y });
        if (playerTrail.length > 80) {
          playerTrail.shift();
        }
      }

      camera.x += (player.x - camera.x) * camera.lerp;
      camera.y += (player.y - camera.y) * camera.lerp;

      const halfW = canvas.width / 2;
      const halfH = canvas.height / 2;
      camera.x = clamp(camera.x, halfW, WORLD.w - halfW);
      camera.y = clamp(camera.y, halfH, WORLD.h - halfH);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = WORLD.w;
        if (p.x > WORLD.w) p.x = 0;
        if (p.y < 0) p.y = WORLD.h;
        if (p.y > WORLD.h) p.y = 0;
      }

      for (const f of textFragments) {
        f.x += f.vx;
        f.y += f.vy;
        if (f.x < 0) f.x = WORLD.w;
        if (f.x > WORLD.w) f.x = 0;
        if (f.y < 0) f.y = WORLD.h;
        if (f.y > WORLD.h) f.y = 0;
      }

      const now = time;
      if (now >= nextEventTime) {
        triggerAtmosphericEvent(now);
      }

      for (let i = atmosphericEvents.length - 1; i >= 0; i--) {
        if (now - atmosphericEvents[i].startTime > atmosphericEvents[i].duration) {
          atmosphericEvents.splice(i, 1);
        }
      }

      for (let i = clickRings.length - 1; i >= 0; i--) {
        if (now - clickRings[i].createdAt > 1600) {
          clickRings.splice(i, 1);
        }
      }

      nearestIndex = -1;
      let nearestDist = Infinity;
      chambers.forEach((c, i) => {
        const d = dist(player.x, player.y, c.x, c.y);
        if (d < nearestDist) {
          nearestDist = d;
          nearestIndex = i;
        }
        if (d <= 200 && !discovered.has(i)) {
          discovered.add(i);
          localStorage.setItem('liminal-discovered', JSON.stringify([...discovered]));
        }
      });

      for (const secret of voidSecrets) {
        const d = dist(player.x, player.y, secret.x, secret.y);
        if (d <= 60 && !discoveredVoidSecrets.has(secret.id)) {
          discoveredVoidSecrets.add(secret.id);
          localStorage.setItem('liminal-void-secrets', JSON.stringify([...discoveredVoidSecrets]));
        }
      }

      let trailsChanged = false;
      narrativeTrails.forEach((trail, trailIndex) => {
        trail.points.forEach((point, pointIndex) => {
          if (dist(player.x, player.y, point.x, point.y) <= 80 && !trailRead[trailIndex].has(pointIndex)) {
            trailRead[trailIndex].add(pointIndex);
            trailsChanged = true;
            if (trailRead[trailIndex].size >= trail.points.length && !completedTrails.has(trailIndex)) {
              completedTrails.add(trailIndex);
              trailCompletionEvents.push({ startTime: time });
            }
          }
        });
      });
      if (trailsChanged) {
        persistTrailRead();
      }

      discEl.textContent = `Discovered: ${discovered.size}/43`;
      if (now - startTime > 5000) {
        hintEl.style.opacity = '0';
      }

      const t = time * 0.001;
      for (const wisp of wisps) {
        const driftX = Math.cos(t * wisp.freq + wisp.phase) * wisp.speed;
        const driftY = Math.sin(t * wisp.freq2 + wisp.phase2) * wisp.speed;
        wisp.x += driftX;
        wisp.y += driftY;

        const d = dist(player.x, player.y, wisp.x, wisp.y);
        if (d < 100) {
          const push = (100 - d) / 100;
          const dx = wisp.x - player.x;
          const dy = wisp.y - player.y;
          const len = Math.hypot(dx, dy) || 1;
          wisp.x += (dx / len) * push * 0.6;
          wisp.y += (dy / len) * push * 0.6;
        }

        if (wisp.x < 0) wisp.x += WORLD.w;
        if (wisp.x > WORLD.w) wisp.x -= WORLD.w;
        if (wisp.y < 0) wisp.y += WORLD.h;
        if (wisp.y > WORLD.h) wisp.y -= WORLD.h;
      }
    }

    function drawWorld(time) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const viewLeft = camera.x - canvas.width / 2;
      const viewTop = camera.y - canvas.height / 2;
      const trailTexts = [];

      // Nebulae
      for (const n of nebulae) {
        if (dist(camera.x, camera.y, n.x, n.y) > 800) continue;
        const gx = n.x - viewLeft;
        const gy = n.y - viewTop;
        const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, n.r);
        glow.addColorStop(0, hexToRgba(n.color, n.alpha));
        glow.addColorStop(1, hexToRgba(n.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(gx, gy, n.r, 0, Math.PI * 2);
        ctx.fill();
      }

      drawEdgeGlow(viewLeft, viewTop);

      // Particles
      for (const p of particles) {
        if (Math.abs(p.x - camera.x) > 500 || Math.abs(p.y - camera.y) > 500) continue;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - viewLeft, p.y - viewTop, p.r, p.r);
      }

      // Narrative trails
      narrativeTrails.forEach((trail, trailIndex) => {
        const readSet = trailRead[trailIndex];
        let lastRead = -1;
        if (readSet.size) {
          readSet.forEach((idx) => {
            if (idx > lastRead) lastRead = idx;
          });
        }
        const nextIndex = lastRead + 1 < trail.points.length ? lastRead + 1 : -1;
        trail.points.forEach((point, pointIndex) => {
          if (dist(camera.x, camera.y, point.x, point.y) > 400) return;
          const dPlayer = dist(player.x, player.y, point.x, point.y);
          if (dPlayer > 250) return;
          const isNext = pointIndex === nextIndex;
          const flicker = clamp(0.6 + 0.4 * Math.sin(time * 0.006 + (point.x + point.y) * 0.02), 0.2, 1);
          const baseAlpha = isNext ? 0.25 : 0.125;
          ctx.fillStyle = `rgba(255,255,255,${baseAlpha * flicker})`;
          ctx.beginPath();
          ctx.arc(point.x - viewLeft, point.y - viewTop, 2, 0, Math.PI * 2);
          ctx.fill();
          if (dPlayer <= 80) {
            trailTexts.push({ x: point.x - viewLeft, y: point.y - viewTop, text: point.text });
          }
        });
      });

      // Pathways
      for (const [a, b] of pathways) {
        const ca = chambers[a];
        const cb = chambers[b];
        const near = dist(player.x, player.y, (ca.x + cb.x)/2, (ca.y + cb.y)/2) < 280;
        ctx.strokeStyle = near ? '#2d1b6960' : '#1a1a3e40';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ca.x - viewLeft, ca.y - viewTop);
        ctx.lineTo(cb.x - viewLeft, cb.y - viewTop);
        ctx.stroke();
      }

      // Floating fragments
      ctx.fillStyle = '#a0a0b015';
      ctx.font = 'italic 13px "Cormorant Garamond", Georgia, serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      for (const f of textFragments) {
        if (dist(player.x, player.y, f.x, f.y) > 250) continue;
        ctx.fillText(f.text, f.x - viewLeft, f.y - viewTop);
      }

      // Region labels
      for (const label of regionLabels) {
        if (dist(camera.x, camera.y, label.x, label.y) > 400) continue;
        ctx.fillStyle = label.color;
        ctx.font = `${label.size}px "Cormorant Garamond", Georgia, serif`;
        drawSpacedText(label.text, label.x - viewLeft, label.y - viewTop, label.spacing);
      }

      // Player trail
      if (playerTrail.length > 1) {
        for (let i = 0; i < playerTrail.length; i++) {
          const t = playerTrail.length === 1 ? 1 : i / (playerTrail.length - 1);
          const alpha = 0.15 * t;
          if (alpha <= 0) continue;
          const pos = playerTrail[i];
          ctx.fillStyle = `rgba(201,169,110,${alpha})`;
          ctx.beginPath();
          ctx.arc(pos.x - viewLeft, pos.y - viewTop, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (const event of atmosphericEvents) {
        if (event.type !== 'glow') continue;
        if (dist(camera.x, camera.y, event.x, event.y) > 900) continue;
        const progress = clamp((time - event.startTime) / event.duration, 0, 1);
        const alpha = progress < 0.5 ? progress * 2 : (1 - progress) * 2;
        const gx = event.x - viewLeft;
        const gy = event.y - viewTop;
        const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, event.radius);
        glow.addColorStop(0, hexToRgba(event.color, 0.25 * alpha));
        glow.addColorStop(1, hexToRgba(event.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(gx, gy, event.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // Chambers
      const pulse = (Math.sin(time * 0.002) + 1) / 2;
      const flickerBoost = time < flickerUntil ? 1.5 : 1;
      for (let i = 0; i < chambers.length; i++) {
        const c = chambers[i];
        if (Math.abs(c.x - camera.x) > 600 || Math.abs(c.y - camera.y) > 600) continue;
        const d = dist(player.x, player.y, c.x, c.y);
        const gx = c.x - viewLeft;
        const gy = c.y - viewTop;

        const glow = ctx.createRadialGradient(gx, gy, 10, gx, gy, 40);
        const baseAlpha = d <= 80 ? 0.8 : (0.3 + 0.3 * pulse);
        const alpha = clamp(baseAlpha * flickerBoost, 0, 1);
        glow.addColorStop(0, hexToRgba(c.color, alpha));
        glow.addColorStop(1, hexToRgba(c.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(gx, gy, 40, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.arc(gx, gy, 20, 0, Math.PI * 2);
        ctx.fill();

        if (d <= 200) {
          ctx.fillStyle = '#ffffff';
          ctx.font = '16px "Cormorant Garamond", Georgia, serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(c.name, gx, gy - 26);
        }
        if (d <= 120) {
          ctx.fillStyle = '#a0a0b0';
          ctx.font = 'italic 12px "Cormorant Garamond", Georgia, serif';
          ctx.textBaseline = 'top';
          ctx.fillText(c.tag, gx, gy + 24);
        }
        if (d <= 80) {
          ctx.fillStyle = '#c9a96e';
          ctx.font = '11px "Cormorant Garamond", Georgia, serif';
          ctx.textBaseline = 'top';
          ctx.fillText('[Enter] to visit', gx, gy + 40);
        }
      }

      // Void secrets
      for (const secret of voidSecrets) {
        const d = dist(player.x, player.y, secret.x, secret.y);
        if (d > 150) continue;
        const sx = secret.x - viewLeft;
        const sy = secret.y - viewTop;
        const pulse = secret.id === 'buried-star' ? (0.6 + 0.4 * Math.sin(time * 0.004)) : 1;
        const dotGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 6);
        dotGlow.addColorStop(0, `rgba(255,255,255,${0.6 * pulse})`);
        dotGlow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = dotGlow;
        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fill();

        if (d <= 60) {
          ctx.fillStyle = '#c9a96e';
          ctx.font = secret.id === 'last-word'
            ? 'italic 40px "Cormorant Garamond", Georgia, serif'
            : 'italic 13px "Cormorant Garamond", Georgia, serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(secret.text, sx, sy - 10);
        }
      }

      const markTexts = [];
      for (const mark of marks) {
        if (dist(camera.x, camera.y, mark.x, mark.y) > 800) continue;
        const mx = mark.x - viewLeft;
        const my = mark.y - viewTop;
        const glow = ctx.createRadialGradient(mx, my, 0, mx, my, 12);
        glow.addColorStop(0, 'rgba(201,169,110,0.3)');
        glow.addColorStop(1, 'rgba(201,169,110,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(mx, my, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#c9a96e';
        ctx.beginPath();
        ctx.arc(mx, my, 3, 0, Math.PI * 2);
        ctx.fill();

        if (dist(player.x, player.y, mark.x, mark.y) <= 80) {
          markTexts.push({ x: mx, y: my, text: mark.text });
        }
      }

      // Wisps
      for (const wisp of wisps) {
        if (dist(player.x, player.y, wisp.x, wisp.y) > VIS_RADIUS) continue;
        const wx = wisp.x - viewLeft;
        const wy = wisp.y - viewTop;
        const glow = ctx.createRadialGradient(wx, wy, 0, wx, wy, 15);
        glow.addColorStop(0, hexToRgba(wisp.color, 0.7));
        glow.addColorStop(1, hexToRgba(wisp.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(wx, wy, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = wisp.color;
        ctx.beginPath();
        ctx.arc(wx, wy, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Player orb
      const px = player.x - viewLeft;
      const py = player.y - viewTop;
      const pGlow = ctx.createRadialGradient(px, py, player.core, px, py, player.glow);
      pGlow.addColorStop(0, '#ffffff');
      pGlow.addColorStop(0.3, '#c9a96e');
      pGlow.addColorStop(1, 'rgba(201,169,110,0)');
      ctx.fillStyle = pGlow;
      ctx.beginPath();
      ctx.arc(px, py, player.glow, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(px, py, player.core, 0, Math.PI * 2);
      ctx.fill();

      // Click target rings
      for (const ring of clickRings) {
        const age = time - ring.createdAt;
        const alpha = clamp(0.8 - age / 1400, 0, 0.8);
        if (alpha <= 0) continue;
        ctx.strokeStyle = `rgba(201,169,110,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(ring.x - viewLeft, ring.y - viewTop, 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Fog of war
      const fog = ctx.createRadialGradient(px, py, VIS_RADIUS * 0.6, px, py, VIS_RADIUS);
      fog.addColorStop(0, 'rgba(10,10,15,0)');
      fog.addColorStop(1, '#0a0a0f');
      ctx.fillStyle = fog;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Shooting stars (screen space)
      for (const event of atmosphericEvents) {
        if (event.type !== 'shooting') continue;
        const progress = clamp((time - event.startTime) / event.duration, 0, 1);
        const alpha = 1 - progress;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(event.startX, event.startY);
        const lx = event.startX + (event.endX - event.startX) * progress;
        const ly = event.startY + (event.endY - event.startY) * progress;
        ctx.lineTo(lx, ly);
        ctx.stroke();
      }

      if (trailCompletionEvents.length) {
        ctx.font = '14px "Cormorant Garamond", Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = trailCompletionEvents.length - 1; i >= 0; i--) {
          const age = time - trailCompletionEvents[i].startTime;
          if (age > 3000) {
            trailCompletionEvents.splice(i, 1);
            continue;
          }
          const alpha = clamp(1 - age / 3000, 0, 1);
          ctx.fillStyle = `rgba(201,169,110,${alpha})`;
          ctx.fillText('You have followed the trail to its end.', canvas.width / 2, canvas.height / 2);
        }
      }

      // Mark texts
      if (markTexts.length) {
        ctx.fillStyle = '#c9a96e';
        ctx.font = '11px "Cormorant Garamond", Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        for (const mark of markTexts) {
          ctx.fillText(mark.text, mark.x, mark.y - 8);
        }
      }

      if (trailTexts.length) {
        ctx.fillStyle = 'rgba(208,208,224,0.7)';
        ctx.font = 'italic 12px "Cormorant Garamond", Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        for (const t of trailTexts) {
          ctx.fillText(t.text, t.x, t.y - 10);
        }
      }

      drawMinimap();
    }

    function drawEdgeGlow(viewLeft, viewTop) {
      const leftDist = viewLeft;
      const rightDist = WORLD.w - (viewLeft + canvas.width);
      const topDist = viewTop;
      const bottomDist = WORLD.h - (viewTop + canvas.height);
      const edgeFade = 100;

      if (leftDist < edgeFade) {
        const w = clamp(edgeFade - leftDist, 0, edgeFade);
        const grad = ctx.createLinearGradient(0, 0, w, 0);
        grad.addColorStop(0, '#2d1b6920');
        grad.addColorStop(1, 'rgba(45,27,105,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, canvas.height);
      }
      if (rightDist < edgeFade) {
        const w = clamp(edgeFade - rightDist, 0, edgeFade);
        const grad = ctx.createLinearGradient(canvas.width, 0, canvas.width - w, 0);
        grad.addColorStop(0, '#2d1b6920');
        grad.addColorStop(1, 'rgba(45,27,105,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(canvas.width - w, 0, w, canvas.height);
      }
      if (topDist < edgeFade) {
        const h = clamp(edgeFade - topDist, 0, edgeFade);
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#2d1b6920');
        grad.addColorStop(1, 'rgba(45,27,105,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, h);
      }
      if (bottomDist < edgeFade) {
        const h = clamp(edgeFade - bottomDist, 0, edgeFade);
        const grad = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - h);
        grad.addColorStop(0, '#2d1b6920');
        grad.addColorStop(1, 'rgba(45,27,105,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - h, canvas.width, h);
      }
    }

    function drawMinimap() {
      mctx.clearRect(0, 0, minimap.width, minimap.height);
      mctx.fillStyle = '#0a0a0f99';
      mctx.fillRect(0, 0, minimap.width, minimap.height);
      mctx.strokeStyle = '#2d1b69';
      mctx.strokeRect(0.5, 0.5, minimap.width - 1, minimap.height - 1);

      const scale = 1 / 33.3;
      chambers.forEach((c, i) => {
        const x = c.x * scale;
        const y = c.y * scale;
        if (discovered.has(i)) {
          mctx.fillStyle = c.color;
        } else {
          mctx.fillStyle = '#ffffff10';
        }
        mctx.beginPath();
        mctx.arc(x, y, 3, 0, Math.PI * 2);
        mctx.fill();
      });

      if (marks.length) {
        mctx.fillStyle = '#c9a96e';
        for (const mark of marks) {
          const mx = mark.x * scale;
          const my = mark.y * scale;
          mctx.beginPath();
          mctx.arc(mx, my, 2, 0, Math.PI * 2);
          mctx.fill();
        }
      }

      mctx.fillStyle = '#ffffff';
      mctx.beginPath();
      mctx.arc(player.x * scale, player.y * scale, 4, 0, Math.PI * 2);
      mctx.fill();
    }

    function hexToRgba(hex, a) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function drawSpacedText(text, x, y, spacing) {
      const chars = text.split('');
      let cursor = x;
      const totalWidth = chars.reduce((sum, ch) => sum + ctx.measureText(ch).width, 0);
      const totalSpacing = spacing * (chars.length - 1);
      cursor -= (totalWidth + totalSpacing) / 2;
      for (const ch of chars) {
        ctx.fillText(ch, cursor, y);
        cursor += ctx.measureText(ch).width + spacing;
      }
    }

    function loop(time) {
      const dt = time - lastTime;
      lastTime = time;
      if (introPhase !== 'done') {
        advanceIntro(time);
        drawIntro(time);
      } else {
        update(dt, time);
        drawWorld(time);
      }
      requestAnimationFrame(loop);
    }

    const startTime = performance.now();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
