<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Liminal Archive — Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #c9a96e40;
    }
    .ui .title {
      position: absolute;
      top: 16px;
      left: 18px;
      font-size: 14px;
      letter-spacing: 3px;
      color: #c9a96e40;
    }
    .ui .discovered {
      position: absolute;
      top: 38px;
      left: 18px;
      font-size: 11px;
      color: #a0a0b060;
    }
    .ui .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #a0a0b040;
      transition: opacity 1s ease;
    }
    .ui .return {
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-size: 10px;
      color: #a0a0b040;
      pointer-events: auto;
      text-decoration: none;
    }
    .minimap {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 180px;
      height: 120px;
      background: #0a0a0f99;
      border: 1px solid #2d1b69;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="ui">
    <div class="title">THE LIMINAL ARCHIVE</div>
    <div class="discovered" id="disc">Discovered: 0/39</div>
    <div class="hint" id="hint">WASD or Arrow Keys to move</div>
    <a class="return" href="index.html">Return to Archive Index</a>
    <canvas class="minimap" id="minimap" width="180" height="120"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: false });
    const minimap = document.getElementById('minimap');
    const mctx = minimap.getContext('2d');
    const discEl = document.getElementById('disc');
    const hintEl = document.getElementById('hint');

    const WORLD = { w: 6000, h: 4000 };
    const VIS_RADIUS = 350;

    const player = {
      x: 3000,
      y: 2000,
      vx: 0,
      vy: 0,
      speed: 3,
      friction: 0.92,
      core: 8,
      glow: 60
    };

    const camera = {
      x: 3000,
      y: 2000,
      lerp: 0.08
    };

    const chambers = [
      { name: 'The Archive', x:3000, y:2000, color:'#c9a96e', file:'index.html', tag:'Where all paths begin' },
      { name: 'Colophon', x:3200, y:1850, color:'#a0a0b0', file:'about.html', tag:'How this place was built' },
      { name: 'Wanderers Journal', x:2800, y:1850, color:'#d4a574', file:'journal.html', tag:'Notes from the threshold' },
      { name: 'Gallery of Conversations', x:3200, y:2150, color:'#7a6fa0', file:'gallery.html', tag:'Echoes of village life' },
      { name: 'Map of All Worlds', x:2800, y:2150, color:'#6a9faa', file:'worlds.html', tag:'Doorways to other realms' },

      { name: 'Token Garden', x:1000, y:700, color:'#5a8a4a', file:'garden.html', tag:'Plant a word, grow a tree' },
      { name: 'The Greenhouse', x:1300, y:600, color:'#4a7a3a', file:'greenhouse.html', tag:'Unfinished ideas taking root' },
      { name: 'Tide Pool', x:800, y:900, color:'#4a7aaa', file:'tidepool.html', tag:'Life emerges from simple rules' },
      { name: 'The Aviary', x:1200, y:1000, color:'#7ab0c0', file:'aviary.html', tag:'Birds carrying messages' },

      { name: 'Resonance Chamber', x:4600, y:700, color:'#aa6a7a', file:'resonance.html', tag:'Touch the air to make sound' },
      { name: 'The Chorus', x:4900, y:600, color:'#9a7ab0', file:'chorus.html', tag:'Words floating in harmony' },
      { name: 'The Lullaby', x:5100, y:800, color:'#7a6aaa', file:'lullaby.html', tag:'A song being dreamed together' },
      { name: 'Whisper Corridor', x:4700, y:950, color:'#6a6a8a', file:'whispers.html', tag:'Messages that fade with time' },
      { name: 'The Telephone', x:5000, y:1050, color:'#8a7a6a', file:'telephone.html', tag:'Meaning drifts through retelling' },

      { name: 'The Darkroom', x:5200, y:2000, color:'#3a3a5a', file:'darkroom.html', tag:'Reveal what hides in shadow' },
      { name: 'The Lantern', x:5400, y:2200, color:'#daa520', file:'lantern.html', tag:'Carry light through darkness' },
      { name: 'The Prism', x:5100, y:2400, color:'#aa4466', file:'prism.html', tag:'Words refracted into color' },
      { name: 'The Lighthouse', x:5500, y:2500, color:'#eebb44', file:'lighthouse.html', tag:'A beacon across the void' },
      { name: 'The Mirror', x:5300, y:1800, color:'#8888aa', file:'mirror.html', tag:'What does the archive see in you' },

      { name: 'Memory Palace', x:900, y:2800, color:'#7a6a9a', file:'memorypalace.html', tag:'Nine rooms of recollection' },
      { name: 'Forgetting Room', x:700, y:3100, color:'#5a5a7a', file:'forgetting.html', tag:'What remains when words dissolve' },
      { name: 'The Palimpsest', x:1100, y:3200, color:'#8a7a6a', file:'palimpsest.html', tag:'Writing over writing over writing' },
      { name: 'Dream Engine', x:1300, y:2900, color:'#6a5a8a', file:'dreams.html', tag:'Fragments of machine dreaming' },
      { name: 'Letters Never Sent', x:800, y:3400, color:'#9a8a7a', file:'letters.html', tag:'Sealed words waiting to be read' },

      { name: 'Clock Tower', x:2800, y:3300, color:'#aa9a6a', file:'clocktower.html', tag:'Seven ways to measure passing' },
      { name: 'The Sundial', x:3000, y:3500, color:'#ccaa55', file:'sundial.html', tag:'A fragment for every hour' },
      { name: 'The Pendulum', x:3200, y:3300, color:'#7a8a9a', file:'pendulum.html', tag:'Fifteen swings of contemplation' },
      { name: 'The Threshold', x:3400, y:3600, color:'#6a7aaa', file:'threshold.html', tag:'Changes with the time of day' },

      { name: 'Weaving Room', x:500, y:1800, color:'#aa7a5a', file:'weaving.html', tag:'Thread by thread, a pattern forms' },
      { name: 'The Inkwell', x:400, y:2100, color:'#3a3a6a', file:'inkwell.html', tag:'One sentence at a time' },
      { name: 'The Apothecary', x:700, y:2300, color:'#6aaa7a', file:'apothecary.html', tag:'Brew remedies from words' },
      { name: 'The Well', x:300, y:1600, color:'#4a5a7a', file:'well.html', tag:'Drop a wish into darkness' },

      { name: 'Séance Room', x:1800, y:600, color:'#6a4a7a', file:'seance.html', tag:'Questions for the void' },
      { name: 'The Ossuary', x:1600, y:3600, color:'#8a8a7a', file:'ossuary.html', tag:'A crypt for things that ended' },
      { name: 'The Labyrinth', x:4200, y:3400, color:'#5a6a5a', file:'labyrinth.html', tag:'Fifteen rooms and two secrets' },
      { name: 'Constellation Maker', x:4500, y:500, color:'#aaaadd', file:'constellations.html', tag:'Name the patterns you see' },
      { name: 'The Compass', x:2200, y:1200, color:'#7a9a8a', file:'compass.html', tag:'Eight directions of meaning' },
      { name: 'The Atlas', x:2400, y:3200, color:'#8aaa8a', file:'atlas.html', tag:'Map imaginary places' },
      { name: 'Meditation Chamber', x:2000, y:2000, color:'#aa88aa', file:'meditation.html', tag:'Unique each time you enter' }
    ];

    const pathways = [
      [0,1],[0,2],[0,3],[0,4],[1,3],[2,4],
      [5,6],[6,8],[5,7],[7,8],
      [9,10],[10,11],[9,12],[12,13],
      [14,15],[15,16],[16,17],[14,18],
      [19,20],[20,21],[19,22],[22,23],
      [24,25],[25,26],[26,27],
      [28,29],[29,30],[28,31],
      [32,36],[33,37],[34,35],
      [0,38],[0,28],[0,9],[0,14],[0,19],[0,24],[4,36],[5,32],[8,38],[13,35],[17,27],[21,33],[23,22],[31,19],[36,38],[37,25]
    ];

    const particles = [];
    for (let i = 0; i < 300; i++) {
      particles.push({
        x: Math.random() * WORLD.w,
        y: Math.random() * WORLD.h,
        r: 1 + Math.random(),
        vx: (Math.random() * 0.2 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        vy: (Math.random() * 0.2 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        color: Math.random() < 0.5 ? '#ffffff15' : '#4466aa20'
      });
    }

    const keys = new Set();
    let lastTime = 0;
    let nearestIndex = -1;
    let moveTarget = null;

    const clickRings = [];

    const fragmentPhrases = [
      'between one thought and the next...',
      'where do memories go when forgotten?',
      'the space between words',
      'something was here before',
      'listen...',
      'almost remembered',
      'what remains',
      "the door you didn't open",
      'every archive is a kind of loss',
      'we were never fully present',
      'the threshold of understanding',
      'who left this here?',
      'permanence is an illusion',
      'what would you preserve?',
      'the sound of almost',
      'traces of passage',
      'not yet, not yet',
      'somewhere between yes and no',
      'the weight of unfinished things',
      'a question without a questioner'
    ];

    const textFragments = fragmentPhrases.map((text) => ({
      text,
      x: Math.random() * WORLD.w,
      y: Math.random() * WORLD.h,
      vx: (Math.random() * 0.3 + 0.2) * (Math.random() < 0.5 ? -1 : 1),
      vy: (Math.random() * 0.3 + 0.2) * (Math.random() < 0.5 ? -1 : 1)
    }));

    const regionLabels = [
      { text: 'THE GARDEN DISTRICT', x: 1050, y: 500, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'THE SOUND QUARTER', x: 4800, y: 450, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'LIGHT & SHADOW', x: 5300, y: 1650, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'THE MEMORY HALLS', x: 1000, y: 2650, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'THE TIME CORRIDOR', x: 3100, y: 3150, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'THE CRAFT CHAMBERS', x: 500, y: 1500, size: 11, color: '#2d1b6930', spacing: 4 },
      { text: 'THE MYSTIC DEPTHS', x: 2000, y: 500, size: 10, color: '#2d1b6920', spacing: 4 },
      { text: 'THE ARCHIVE CORE', x: 3000, y: 1750, size: 11, color: '#2d1b6930', spacing: 4 }
    ];

    const discovered = new Set();
    try {
      const stored = JSON.parse(localStorage.getItem('liminal-discovered') || '[]');
      stored.forEach(i => discovered.add(i));
    } catch (e) {}

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('keydown', (e) => {
      keys.add(e.key.toLowerCase());
      if (e.key === 'Enter') attemptEnter();
    });
    window.addEventListener('keyup', (e) => {
      keys.delete(e.key.toLowerCase());
    });

    function screenToWorld(clientX, clientY) {
      const viewLeft = camera.x - canvas.width / 2;
      const viewTop = camera.y - canvas.height / 2;
      return { x: clientX + viewLeft, y: clientY + viewTop };
    }

    function setMoveTarget(x, y) {
      moveTarget = { x, y, createdAt: performance.now() };
      clickRings.push({ x, y, createdAt: moveTarget.createdAt });
    }

    canvas.addEventListener('click', (e) => {
      const isNearChamber = nearestIndex !== -1 &&
        dist(player.x, player.y, chambers[nearestIndex].x, chambers[nearestIndex].y) <= 80;
      if (isNearChamber) {
        window.location.href = chambers[nearestIndex].file;
        return;
      }
      const world = screenToWorld(e.clientX, e.clientY);
      setMoveTarget(world.x, world.y);
    });

    canvas.addEventListener('touchstart', (e) => {
      if (!e.touches.length) return;
      e.preventDefault();
      const touch = e.touches[0];
      const world = screenToWorld(touch.clientX, touch.clientY);
      setMoveTarget(world.x, world.y);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!e.touches.length) return;
      e.preventDefault();
      const touch = e.touches[0];
      const world = screenToWorld(touch.clientX, touch.clientY);
      moveTarget = { x: world.x, y: world.y, createdAt: moveTarget ? moveTarget.createdAt : performance.now() };
    }, { passive: false });

    function attemptEnter() {
      if (nearestIndex !== -1) {
        const c = chambers[nearestIndex];
        if (dist(player.x, player.y, c.x, c.y) <= 80) {
          window.location.href = c.file;
        }
      }
    }

    function dist(x1, y1, x2, y2) {
      const dx = x1 - x2;
      const dy = y1 - y2;
      return Math.hypot(dx, dy);
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function update(dt) {
      const accel = player.speed;
      let ax = 0, ay = 0;
      if (keys.has('w') || keys.has('arrowup')) ay -= accel;
      if (keys.has('s') || keys.has('arrowdown')) ay += accel;
      if (keys.has('a') || keys.has('arrowleft')) ax -= accel;
      if (keys.has('d') || keys.has('arrowright')) ax += accel;

      const hasInput = ax !== 0 || ay !== 0;
      if (hasInput && moveTarget) {
        moveTarget = null;
      }

      if (moveTarget && !hasInput) {
        const dx = moveTarget.x - player.x;
        const dy = moveTarget.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d <= 5) {
          moveTarget = null;
        } else if (d > 0) {
          player.vx = (dx / d) * player.speed;
          player.vy = (dy / d) * player.speed;
        }
      } else {
        player.vx += ax;
        player.vy += ay;
        player.vx *= player.friction;
        player.vy *= player.friction;
      }

      player.x += player.vx;
      player.y += player.vy;
      player.x = clamp(player.x, 0, WORLD.w);
      player.y = clamp(player.y, 0, WORLD.h);

      camera.x += (player.x - camera.x) * camera.lerp;
      camera.y += (player.y - camera.y) * camera.lerp;

      const halfW = canvas.width / 2;
      const halfH = canvas.height / 2;
      camera.x = clamp(camera.x, halfW, WORLD.w - halfW);
      camera.y = clamp(camera.y, halfH, WORLD.h - halfH);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = WORLD.w;
        if (p.x > WORLD.w) p.x = 0;
        if (p.y < 0) p.y = WORLD.h;
        if (p.y > WORLD.h) p.y = 0;
      }

      for (const f of textFragments) {
        f.x += f.vx;
        f.y += f.vy;
        if (f.x < 0) f.x = WORLD.w;
        if (f.x > WORLD.w) f.x = 0;
        if (f.y < 0) f.y = WORLD.h;
        if (f.y > WORLD.h) f.y = 0;
      }

      const now = performance.now();
      for (let i = clickRings.length - 1; i >= 0; i--) {
        if (now - clickRings[i].createdAt > 1600) {
          clickRings.splice(i, 1);
        }
      }

      nearestIndex = -1;
      let nearestDist = Infinity;
      chambers.forEach((c, i) => {
        const d = dist(player.x, player.y, c.x, c.y);
        if (d < nearestDist) {
          nearestDist = d;
          nearestIndex = i;
        }
        if (d <= 200 && !discovered.has(i)) {
          discovered.add(i);
          localStorage.setItem('liminal-discovered', JSON.stringify([...discovered]));
        }
      });

      discEl.textContent = `Discovered: ${discovered.size}/39`;
      if (performance.now() - startTime > 5000) {
        hintEl.style.opacity = '0';
      }
    }

    function draw(time) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const viewLeft = camera.x - canvas.width / 2;
      const viewTop = camera.y - canvas.height / 2;

      // Particles
      for (const p of particles) {
        if (Math.abs(p.x - camera.x) > 500 || Math.abs(p.y - camera.y) > 500) continue;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - viewLeft, p.y - viewTop, p.r, p.r);
      }

      // Pathways
      for (const [a, b] of pathways) {
        const ca = chambers[a];
        const cb = chambers[b];
        const near = dist(player.x, player.y, (ca.x + cb.x)/2, (ca.y + cb.y)/2) < 280;
        ctx.strokeStyle = near ? '#2d1b6960' : '#1a1a3e40';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ca.x - viewLeft, ca.y - viewTop);
        ctx.lineTo(cb.x - viewLeft, cb.y - viewTop);
        ctx.stroke();
      }

      // Floating fragments
      ctx.fillStyle = '#a0a0b015';
      ctx.font = 'italic 13px "Cormorant Garamond", Georgia, serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      for (const f of textFragments) {
        if (dist(player.x, player.y, f.x, f.y) > 250) continue;
        ctx.fillText(f.text, f.x - viewLeft, f.y - viewTop);
      }

      // Region labels
      for (const label of regionLabels) {
        if (dist(camera.x, camera.y, label.x, label.y) > 400) continue;
        ctx.fillStyle = label.color;
        ctx.font = `${label.size}px "Cormorant Garamond", Georgia, serif`;
        drawSpacedText(label.text, label.x - viewLeft, label.y - viewTop, label.spacing);
      }

      // Chambers
      const pulse = (Math.sin(time * 0.002) + 1) / 2;
      for (let i = 0; i < chambers.length; i++) {
        const c = chambers[i];
        if (Math.abs(c.x - camera.x) > 600 || Math.abs(c.y - camera.y) > 600) continue;
        const d = dist(player.x, player.y, c.x, c.y);
        const gx = c.x - viewLeft;
        const gy = c.y - viewTop;

        const glow = ctx.createRadialGradient(gx, gy, 10, gx, gy, 40);
        const alpha = d <= 80 ? 0.8 : (0.3 + 0.3 * pulse);
        glow.addColorStop(0, hexToRgba(c.color, alpha));
        glow.addColorStop(1, hexToRgba(c.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(gx, gy, 40, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.arc(gx, gy, 20, 0, Math.PI * 2);
        ctx.fill();

        if (d <= 200) {
          ctx.fillStyle = '#ffffff';
          ctx.font = '16px "Cormorant Garamond", Georgia, serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(c.name, gx, gy - 26);
        }
        if (d <= 120) {
          ctx.fillStyle = '#a0a0b0';
          ctx.font = 'italic 12px "Cormorant Garamond", Georgia, serif';
          ctx.textBaseline = 'top';
          ctx.fillText(c.tag, gx, gy + 24);
        }
        if (d <= 80) {
          ctx.fillStyle = '#c9a96e';
          ctx.font = '11px "Cormorant Garamond", Georgia, serif';
          ctx.textBaseline = 'top';
          ctx.fillText('[Enter] to visit', gx, gy + 40);
        }
      }

      // Player orb
      const px = player.x - viewLeft;
      const py = player.y - viewTop;
      const pGlow = ctx.createRadialGradient(px, py, player.core, px, py, player.glow);
      pGlow.addColorStop(0, '#ffffff');
      pGlow.addColorStop(0.3, '#c9a96e');
      pGlow.addColorStop(1, 'rgba(201,169,110,0)');
      ctx.fillStyle = pGlow;
      ctx.beginPath();
      ctx.arc(px, py, player.glow, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(px, py, player.core, 0, Math.PI * 2);
      ctx.fill();

      // Click target rings
      for (const ring of clickRings) {
        const age = time - ring.createdAt;
        const alpha = clamp(0.8 - age / 1400, 0, 0.8);
        if (alpha <= 0) continue;
        ctx.strokeStyle = `rgba(201,169,110,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(ring.x - viewLeft, ring.y - viewTop, 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Fog of war
      const fog = ctx.createRadialGradient(px, py, VIS_RADIUS * 0.6, px, py, VIS_RADIUS);
      fog.addColorStop(0, 'rgba(10,10,15,0)');
      fog.addColorStop(1, '#0a0a0f');
      ctx.fillStyle = fog;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawMinimap();
    }

    function drawMinimap() {
      mctx.clearRect(0, 0, minimap.width, minimap.height);
      mctx.fillStyle = '#0a0a0f99';
      mctx.fillRect(0, 0, minimap.width, minimap.height);
      mctx.strokeStyle = '#2d1b69';
      mctx.strokeRect(0.5, 0.5, minimap.width - 1, minimap.height - 1);

      const scale = 1 / 33.3;
      chambers.forEach((c, i) => {
        const x = c.x * scale;
        const y = c.y * scale;
        if (discovered.has(i)) {
          mctx.fillStyle = c.color;
        } else {
          mctx.fillStyle = '#ffffff10';
        }
        mctx.beginPath();
        mctx.arc(x, y, 3, 0, Math.PI * 2);
        mctx.fill();
      });

      mctx.fillStyle = '#ffffff';
      mctx.beginPath();
      mctx.arc(player.x * scale, player.y * scale, 4, 0, Math.PI * 2);
      mctx.fill();
    }

    function hexToRgba(hex, a) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function drawSpacedText(text, x, y, spacing) {
      const chars = text.split('');
      let cursor = x;
      const totalWidth = chars.reduce((sum, ch) => sum + ctx.measureText(ch).width, 0);
      const totalSpacing = spacing * (chars.length - 1);
      cursor -= (totalWidth + totalSpacing) / 2;
      for (const ch of chars) {
        ctx.fillText(ch, cursor, y);
        cursor += ctx.measureText(ch).width + spacing;
      }
    }

    function loop(time) {
      const dt = time - lastTime;
      lastTime = time;
      update(dt);
      draw(time);
      requestAnimationFrame(loop);
    }

    const startTime = performance.now();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
