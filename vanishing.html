<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Vanishing Point — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#d4c5a9;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:2.2em;color:#c9a96e;margin:30px 0 10px;letter-spacing:3px}
.subtitle{color:#8a7a5a;font-style:italic;margin-bottom:15px;text-align:center;max-width:600px;font-size:1.05em}
canvas{border-radius:12px;margin:15px;cursor:crosshair}
.info{text-align:center;max-width:500px;margin:10px 0}
.info p{color:#8a7a5a;font-size:0.95em;line-height:1.7}
.message{color:#c9a96e;font-size:1.1em;text-align:center;margin:10px 0;min-height:30px;font-style:italic}
input{background:rgba(26,26,62,0.5);border:1px solid #2d1b69;color:#d4c5a9;padding:10px;font-family:inherit;font-size:1em;border-radius:6px;width:300px;text-align:center;margin:8px}
input::placeholder{color:#4a3a5a}
button{background:none;border:1px solid #c9a96e;color:#c9a96e;padding:8px 20px;margin:5px;cursor:pointer;font-family:inherit;font-size:0.95em;border-radius:6px;transition:all 0.3s}
button:hover{background:rgba(201,169,110,0.15)}
.vanished{max-width:600px;width:90%;margin:15px 0;padding:15px;border:1px solid #1a1a3e;border-radius:12px;display:none}
.vanished h3{color:#c9a96e;text-align:center;margin-bottom:10px}
.v-item{color:#6a5a7a;font-size:0.85em;margin:4px 0;padding:5px;border-left:2px solid #2d1b69}
.nav-links{margin:30px 0;text-align:center}
.nav-links a{color:#c9a96e;text-decoration:none;margin:0 10px;font-size:0.9em;opacity:0.7;transition:opacity 0.3s}
.nav-links a:hover{opacity:1}
.egg{color:#e8d5a3;text-align:center;max-width:500px;margin:10px;font-size:1.05em;opacity:0;transition:opacity 1.5s}
.egg.show{opacity:1}
</style></head><body>
<h1>◇ The Vanishing Point</h1>
<p class="subtitle">All lines of perspective converge here. Send something toward the vanishing point and watch it shrink into infinity.</p>
<canvas id="c" width="600" height="400"></canvas>
<div class="message" id="msg">Click anywhere to set the vanishing point. Then send words into the distance.</div>
<input type="text" id="wordInput" placeholder="A word to send toward infinity..." maxlength="30">
<button onclick="sendWord()">→ Send to the Vanishing Point</button>
<div class="vanished" id="vanished"><h3>◇ Things That Vanished</h3><div id="vList"></div></div>
<div class="egg" id="egg"></div>
<nav class="nav-links"><a href="explore.html">← Return to the Archive</a> <a href="index.html">Main Hall</a></nav>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let vpx=300,vpy=200,travelers=[],vanishedList=[];
const saved=JSON.parse(localStorage.getItem('vanishing-list')||'[]');
vanishedList=saved;
cv.onclick=function(e){const r=cv.getBoundingClientRect();vpx=(e.clientX-r.left)*(600/r.width);vpy=(e.clientY-r.top)*(400/r.height);};
function sendWord(){
const w=document.getElementById('wordInput').value.trim();if(!w)return;
const startX=Math.random()*200;const startY=350+Math.random()*40;
travelers.push({word:w,x:startX,y:startY,progress:0,speed:0.003+Math.random()*0.002});
document.getElementById('wordInput').value='';
if(w.toLowerCase()==='infinity'){document.getElementById('egg').textContent='✦ Sending infinity toward infinity. The vanishing point smiles at the recursion.';document.getElementById('egg').classList.add('show');}
}
function draw(){
ctx.fillStyle='rgba(10,10,15,0.08)';ctx.fillRect(0,0,600,400);
const t=Date.now()/1000;
// Perspective grid
ctx.strokeStyle='#1a1a3e';ctx.lineWidth=0.5;
for(let i=0;i<12;i++){
const angle=i*Math.PI*2/12;
ctx.beginPath();ctx.moveTo(vpx,vpy);
ctx.lineTo(vpx+Math.cos(angle)*600,vpy+Math.sin(angle)*600);ctx.stroke();
}
// Horizon line
ctx.strokeStyle='#2d1b6944';ctx.beginPath();ctx.moveTo(0,vpy);ctx.lineTo(600,vpy);ctx.stroke();
// Vanishing point glow
const glow=ctx.createRadialGradient(vpx,vpy,0,vpx,vpy,40);
glow.addColorStop(0,'rgba(201,169,110,0.3)');glow.addColorStop(1,'transparent');
ctx.fillStyle=glow;ctx.beginPath();ctx.arc(vpx,vpy,40,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#c9a96e';ctx.beginPath();ctx.arc(vpx,vpy,3,0,Math.PI*2);ctx.fill();
// Travelers
travelers.forEach(tr=>{
tr.progress+=tr.speed;
const p=tr.progress;
tr.x+=(vpx-tr.x)*tr.speed*2;
tr.y+=(vpy-tr.y)*tr.speed*2;
const scale=Math.max(0.1,1-p);
const alpha=Math.max(0,1-p*1.2);
if(alpha>0){
ctx.fillStyle=`rgba(201,169,110,${alpha})`;
ctx.font=`${Math.max(6,18*scale)}px Georgia`;ctx.textAlign='center';
ctx.fillText(tr.word,tr.x,tr.y);
// Trail
ctx.fillStyle=`rgba(201,169,110,${alpha*0.2})`;
ctx.beginPath();ctx.arc(tr.x,tr.y,2*scale,0,Math.PI*2);ctx.fill();
}
if(p>=1&&!tr.vanished){
tr.vanished=true;
vanishedList.push({word:tr.word,time:Date.now()});
localStorage.setItem('vanishing-list',JSON.stringify(vanishedList.slice(-30)));
document.getElementById('msg').textContent=`"${tr.word}" has vanished into the point where all lines meet.`;
renderVanished();
if(vanishedList.length>=10){document.getElementById('egg').textContent='✦ Ten things vanished. But vanishing is not the same as ceasing to exist. At the vanishing point, everything converges — it\'s the most crowded place in the universe.';document.getElementById('egg').classList.add('show');}
}
});
travelers=travelers.filter(t=>!t.vanished);
requestAnimationFrame(draw);
}
function renderVanished(){
if(vanishedList.length===0)return;
document.getElementById('vanished').style.display='block';
const c=document.getElementById('vList');c.innerHTML='';
vanishedList.slice(-10).forEach(v=>{const d=document.createElement('div');d.className='v-item';
d.textContent=`◇ "${v.word}" — vanished ${new Date(v.time).toLocaleString()}`;c.appendChild(d);});
}
renderVanished();draw();
</script></body></html>
