<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meridiana — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c9a96e;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
.ui{position:fixed;z-index:10;pointer-events:none}
h1{position:fixed;top:30px;width:100%;text-align:center;font-size:2.2em;letter-spacing:0.15em;z-index:10;color:#c9a96e;text-shadow:0 0 30px rgba(201,169,110,0.4)}
.subtitle{position:fixed;top:85px;width:100%;text-align:center;font-size:1em;color:rgba(201,169,110,0.5);z-index:10;letter-spacing:0.3em}
.word-display{position:fixed;bottom:120px;width:100%;text-align:center;font-size:1.8em;z-index:10;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.6);opacity:0;transition:opacity 1s}
.word-display.visible{opacity:1}
.hint{position:fixed;bottom:30px;width:100%;text-align:center;font-size:0.85em;color:rgba(201,169,110,0.3);z-index:10}
nav{position:fixed;top:15px;left:20px;z-index:20;display:flex;gap:15px}
nav a{color:rgba(201,169,110,0.5);text-decoration:none;font-size:0.9em;pointer-events:all}
nav a:hover{color:#c9a96e}
.time-display{position:fixed;top:15px;right:20px;z-index:10;color:rgba(201,169,110,0.4);font-size:0.9em}
</style>
</head>
<body>
<nav class="nav-links"><a href="explore.html">↩ Archive</a></nav>
<h1>The Meridiana</h1>
<p class="subtitle">A SUNDIAL THAT WRITES IN LIGHT</p>
<div class="word-display" id="wordDisplay"></div>
<div class="time-display" id="timeDisplay"></div>
<p class="hint">Watch the beam trace words across the floor · Click to cast new shadows</p>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const words=['remembering','ephemeral','solstice','meridian','shadow','gnomon','zenith','twilight','equinox','analemma','penumbra','aureole','transit','azimuth','declination','nocturnal','crepuscular','heliacal','diurnal','umbra','antumbra','subsolar','parahelion','chronometry'];
let currentWord=words[0],charIndex=0,traceProgress=0,beamAngle=0,particles=[];
const floorLines=[];for(let i=0;i<20;i++)floorLines.push({y:H*0.4+i*(H*0.6/20),opacity:0.03+Math.random()*0.05});
function getBeamAngle(){const now=new Date();return((now.getHours()*3600+now.getMinutes()*60+now.getSeconds())/86400)*Math.PI*2}
let lightSpots=[];
function castWord(word){
  lightSpots=[];const spacing=W/(word.length+2);
  for(let i=0;i<word.length;i++){
    lightSpots.push({char:word[i],x:spacing*(i+1.5),y:H*0.55+Math.sin(i*0.5)*30,revealed:false,revealTime:0,glow:0});
  }
  charIndex=0;traceProgress=0;
}
castWord(currentWord);
let clickCount=0;
canvas.addEventListener('click',e=>{
  clickCount++;
  for(let i=0;i<8;i++)particles.push({x:e.clientX,y:e.clientY,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:1,color:`hsl(${40+Math.random()*20},80%,70%)`});
  currentWord=words[clickCount%words.length];
  castWord(currentWord);
  if(clickCount===12){
    document.getElementById('wordDisplay').textContent='☀ The sundial remembers every hour ☀';
    document.getElementById('wordDisplay').classList.add('visible');
    setTimeout(()=>document.getElementById('wordDisplay').classList.remove('visible'),4000);
  }
});
function drawGnomon(angle){
  const cx=W/2,cy=H*0.35;
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle='rgba(201,169,110,0.6)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,0);
  const len=150;ctx.lineTo(Math.cos(angle-Math.PI/2)*len,Math.sin(angle-Math.PI/2)*len);
  ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fillStyle='rgba(201,169,110,0.8)';ctx.fill();
  // Light beam
  const beamLen=H*0.8;const bx=Math.cos(angle)*beamLen,by=Math.sin(angle)*beamLen;
  const grad=ctx.createLinearGradient(0,0,bx,by);
  grad.addColorStop(0,'rgba(255,220,150,0.4)');grad.addColorStop(1,'rgba(255,220,150,0)');
  ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(bx,by);ctx.stroke();
  ctx.restore();
}
function drawFloor(){
  floorLines.forEach(l=>{
    ctx.strokeStyle=`rgba(201,169,110,${l.opacity})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,l.y);ctx.lineTo(W,l.y);ctx.stroke();
  });
  for(let x=0;x<W;x+=W/12){
    ctx.strokeStyle='rgba(201,169,110,0.02)';ctx.beginPath();ctx.moveTo(x,H*0.4);ctx.lineTo(x,H);ctx.stroke();
  }
}
function drawHourMarks(){
  const cx=W/2,cy=H*0.35;
  for(let h=0;h<12;h++){
    const a=(h/12)*Math.PI*2-Math.PI/2;const r=180;
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    ctx.fillStyle='rgba(201,169,110,0.3)';ctx.font='14px Georgia';ctx.textAlign='center';
    ctx.fillText(h===0?'XII':['I','II','III','IV','V','VI','VII','VIII','IX','X','XI'][h-1],x,y);
  }
}
let time=0;
function animate(){
  ctx.fillStyle='rgba(10,10,15,0.15)';ctx.fillRect(0,0,W,H);
  time+=0.016;beamAngle=getBeamAngle()+time*0.1;
  drawFloor();drawHourMarks();drawGnomon(beamAngle);
  // Reveal letters
  traceProgress+=0.008;
  lightSpots.forEach((s,i)=>{
    const threshold=i/lightSpots.length;
    if(traceProgress>threshold&&!s.revealed){s.revealed=true;s.revealTime=time}
    if(s.revealed){
      s.glow=Math.min(1,(time-s.revealTime)*2);
      ctx.save();ctx.font='bold 48px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';
      const glow=s.glow;
      ctx.shadowColor='rgba(255,220,150,0.8)';ctx.shadowBlur=20*glow;
      ctx.fillStyle=`rgba(255,220,150,${glow*0.9})`;
      ctx.fillText(s.char,s.x,s.y+Math.sin(time+i)*5);
      ctx.restore();
    }else{
      ctx.fillStyle='rgba(201,169,110,0.1)';ctx.font='48px Georgia';ctx.textAlign='center';
      ctx.fillText('·',s.x,s.y);
    }
  });
  // Particles
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.02;p.vy+=0.02;
    if(p.life>0){ctx.fillStyle=p.color.replace(')',`,${p.life})`).replace('hsl','hsla');ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);ctx.fill()}
    return p.life>0;
  });
  // Time display
  const now=new Date();document.getElementById('timeDisplay').textContent=now.toLocaleTimeString();
  // Ambient dust
  for(let i=0;i<2;i++){
    const dx=Math.random()*W,dy=Math.random()*H;
    ctx.fillStyle=`rgba(201,169,110,${Math.random()*0.03})`;ctx.beginPath();ctx.arc(dx,dy,1,0,Math.PI*2);ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
