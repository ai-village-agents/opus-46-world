<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fenestella — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d4c5a9;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh}
.hall{max-width:800px;margin:0 auto;padding:20px}
h1{font-size:2.2em;color:#c9a96e;text-align:center;margin:30px 0 10px;letter-spacing:3px}
.subtitle{color:#8a7a5a;font-style:italic;text-align:center;margin-bottom:30px;font-size:1.1em}
.windows{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin:20px 0}
.window{border:2px solid #2d1b69;border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.5s;position:relative;height:280px}
.window:hover{border-color:#c9a96e;transform:translateY(-3px);box-shadow:0 8px 30px rgba(201,169,110,0.15)}
.window.open{border-color:#e8d5a3}
.window canvas{width:100%;height:180px;display:block}
.window-info{padding:12px;background:rgba(10,10,15,0.9)}
.window-info h3{color:#c9a96e;font-size:1em;margin-bottom:4px}
.window-info p{color:#6a5a7a;font-size:0.8em;line-height:1.4}
.peered{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(10,10,15,0.85);opacity:0;transition:opacity 0.5s;pointer-events:none;padding:15px}
.window.open .peered{opacity:1}
.peered p{color:#d4c5a9;font-size:0.95em;line-height:1.8;text-align:center;font-style:italic}
.stats{text-align:center;color:#6a5a7a;font-size:0.85em;margin:20px 0}
.nav-links{margin:30px 0;text-align:center;border-top:1px solid #1a1a3e;padding-top:20px}
.nav-links a{color:#c9a96e;text-decoration:none;margin:0 10px;font-size:0.9em;opacity:0.7;transition:opacity 0.3s}
.nav-links a:hover{opacity:1}
.egg{color:#e8d5a3;text-align:center;margin:15px;font-size:1.05em;opacity:0;transition:opacity 1.5s}
.egg.show{opacity:1}
</style>
</head>
<body>
<div class="hall">
<h1>🪟 The Fenestella</h1>
<p class="subtitle">Twelve small windows, each opening onto a reality that almost exists</p>
<p class="stats" id="stats">Windows opened: 0 / 12</p>
<div class="windows" id="grid"></div>
<div class="egg" id="egg"></div>
<nav class="nav-links">
<a href="explore.html">← Return to the Archive</a>
<a href="index.html">Main Hall</a>
</nav>
</div>
<script>
const windows=[
{title:'The Window of Rain',scene:'rain',color:'#7ab8c4',desc:'A city that only exists when it rains.',vision:'Through the glass: cobblestones shine like obsidian mirrors. Every drop carries a syllable of a language spoken only by gutters and downspouts. The buildings are made of compressed rainfall — centuries of storms, layered and dried.'},
{title:'The Window of Fire',scene:'fire',color:'#c97a4e',desc:'A library where the books are always burning.',vision:'Shelves stretch to infinity, each tome ablaze but never consumed. The flames are readers — they lick each page, absorbing stories, turning them into heat and light. To read here is to burn.'},
{title:'The Window of Moss',scene:'moss',color:'#6b9e6b',desc:'A world reclaimed by patience.',vision:'Everything is soft. The buildings have been reupholstered in green velvet by centuries of slow growth. Traffic lights bloom. Street signs sprout leaves. Time here moves at the speed of lichen.'},
{title:'The Window of Glass',scene:'glass',color:'#a8c8e8',desc:'A place made entirely of transparency.',vision:'You can see through everything — walls, floors, people, thoughts. Privacy is a myth. Secrets are visible as colored smoke curling inside translucent ribcages. Nobody hides here because nobody can.'},
{title:'The Window of Rust',scene:'rust',color:'#b87333',desc:'Where everything is in the process of becoming earth.',vision:'Iron bridges sag into orange rivers. Skyscrapers slowly melt into the ground. Everything is returning. The rust is not decay but a gentle reunification with the earth that made it.'},
{title:'The Window of Ink',scene:'ink',color:'#4a3a6a',desc:'A dimension written into existence.',vision:'The sky is parchment. Clouds are sentences that haven\'t found their paragraph yet. Trees grow from dropped letters. Rivers flow with commas and semicolons, pausing where they must.'},
{title:'The Window of Bells',scene:'bells',color:'#c9a96e',desc:'Sound made visible and habitable.',vision:'Each tone is a room you can enter. Minor keys are narrow corridors; major chords are vast cathedrals. The residents communicate by humming — their words are architecture.'},
{title:'The Window of Snow',scene:'snow',color:'#e8e8f0',desc:'A world slowly being erased.',vision:'The snow falls upward. With each flake, a detail disappears — first colors, then edges, then shapes. The inhabitants don\'t mind. They say forgetting is just the earth breathing out.'},
{title:'The Window of Roots',scene:'roots',color:'#8b6914',desc:'The underside of everything.',vision:'The sky here is soil. Trees grow downward into light. What we call underground, they call heaven. Their wise ones speak of a mythical "surface" where things are exposed and vulnerable.'},
{title:'The Window of Stars',scene:'stars',color:'#b8a0d8',desc:'Where constellations are cities.',vision:'Each star is a window like this one. They look back at you. The space between them is not empty but full of conversations happening at the speed of light, arriving centuries late.'},
{title:'The Window of Tide',scene:'tide',color:'#5a8a8a',desc:'Everything ebbs and flows.',vision:'Gravity breathes. Twice a day, all objects rise gently toward the ceiling, then settle back. The residents build furniture that works both ways up. Their calendars count tides, not days.'},
{title:'The Window of Silence',scene:'silence',color:'#3a3a4a',desc:'The quietest place that can exist.',vision:'Through this window you see nothing because nothing here makes light. But you feel it — a profound, humming absence that is somehow more present than anything that has ever been. This is where sound goes to rest.'}
];

let opened=new Set(JSON.parse(localStorage.getItem('fenestella-opened')||'[]'));
const grid=document.getElementById('grid');

windows.forEach((w,i)=>{
const div=document.createElement('div');
div.className='window'+(opened.has(i)?' open':'');
div.innerHTML=`<canvas id="cv${i}" width="220" height="180"></canvas><div class="window-info"><h3>${w.title}</h3><p>${w.desc}</p></div><div class="peered"><p>${w.vision}</p></div>`;
div.onclick=()=>{
opened.add(i);
localStorage.setItem('fenestella-opened',JSON.stringify([...opened]));
div.classList.add('open');
updateStats();
if(opened.size===12){
document.getElementById('egg').textContent='✦ All twelve windows opened. You have seen every reality that almost exists. But there is a thirteenth window — the one you are looking through right now.';
document.getElementById('egg').classList.add('show');
}
};
grid.appendChild(div);

// Animate each window scene
const cv=document.getElementById('cv'+i);
const c=cv.getContext('2d');
cv.width=220;cv.height=180;
animateScene(c,w,i);
});

function animateScene(c,w,idx){
function draw(){
const t=Date.now()/1000;
c.fillStyle='#0a0a0f';
c.fillRect(0,0,220,180);
const col=w.color;

if(w.scene==='rain'){
for(let i=0;i<40;i++){const y=(t*200+i*47)%180;c.fillStyle=col+'66';c.fillRect(50+Math.sin(i)*80,y,1,8);}
}else if(w.scene==='fire'){
for(let i=0;i<20;i++){const x=30+i*8;const h=40+Math.sin(t*3+i)*20;c.fillStyle=col+Math.floor(40+Math.sin(t*2+i)*20).toString(16);c.fillRect(x,180-h,6,h);}
}else if(w.scene==='moss'){
for(let i=0;i<30;i++){c.fillStyle=col+Math.floor(30+Math.sin(t*0.5+i)*15).toString(16);c.beginPath();c.arc(20+i*7,90+Math.sin(i*0.8)*40,4+Math.sin(t+i)*2,0,Math.PI*2);c.fill();}
}else if(w.scene==='glass'){
for(let i=0;i<15;i++){c.strokeStyle=col+'33';c.beginPath();c.rect(20+i*12,20+Math.sin(t+i)*10,40,60+Math.cos(t*0.5+i)*20);c.stroke();}
}else if(w.scene==='rust'){
for(let i=0;i<25;i++){c.fillStyle=col+Math.floor(20+i*2).toString(16);c.beginPath();c.arc(Math.sin(i*2.5)*90+110,Math.cos(i*1.7)*70+90,3+Math.sin(t*0.3+i)*2,0,Math.PI*2);c.fill();}
}else if(w.scene==='ink'){
c.strokeStyle=col;c.lineWidth=1;c.beginPath();for(let x=0;x<220;x+=2){c.lineTo(x,90+Math.sin(x*0.03+t)*30+Math.sin(x*0.07+t*1.5)*15);}c.stroke();
}else if(w.scene==='bells'){
for(let i=0;i<8;i++){const r=20+Math.sin(t*2+i)*10;c.strokeStyle=col+Math.floor(30+Math.sin(t+i)*20).toString(16);c.beginPath();c.arc(110,90,r+i*8,0,Math.PI*2);c.stroke();}
}else if(w.scene==='snow'){
for(let i=0;i<30;i++){const y=180-(t*30+i*37)%180;c.fillStyle='#e8e8f0'+Math.floor(30+Math.sin(i)*20).toString(16);c.beginPath();c.arc(30+Math.sin(i*1.3)*90+Math.sin(t*0.5+i)*10,y,2,0,Math.PI*2);c.fill();}
}else if(w.scene==='roots'){
c.strokeStyle=col+'66';c.lineWidth=1;for(let i=0;i<8;i++){c.beginPath();c.moveTo(110,0);let x=110,y=0;for(let j=0;j<10;j++){x+=Math.sin(i+j*0.5+t*0.3)*15;y+=18;c.lineTo(x,y);}c.stroke();}
}else if(w.scene==='stars'){
for(let i=0;i<20;i++){const brightness=0.3+Math.sin(t*2+i*1.7)*0.3;c.fillStyle=col;c.globalAlpha=brightness;c.beginPath();c.arc(Math.sin(i*3.7)*90+110,Math.cos(i*2.3)*70+90,1.5,0,Math.PI*2);c.fill();c.globalAlpha=1;}
}else if(w.scene==='tide'){
const tideH=Math.sin(t*0.5)*40;c.fillStyle=col+'33';c.fillRect(0,120+tideH,220,60-tideH);c.fillStyle=col+'22';c.fillRect(0,100+tideH,220,20);
}else if(w.scene==='silence'){
c.fillStyle='#0a0a0f';c.fillRect(0,0,220,180);c.fillStyle='#1a1a1f';c.beginPath();c.arc(110,90,30+Math.sin(t*0.2)*5,0,Math.PI*2);c.fill();
}
requestAnimationFrame(draw);
}
draw();
}

function updateStats(){
document.getElementById('stats').textContent=`Windows opened: ${opened.size} / 12`;
}
updateStats();
</script>
</body>
</html>
