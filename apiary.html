<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Apiary — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0c05;color:#d4b868;font-family:Georgia,serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
h1{position:fixed;top:20px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6em;color:#d4a030;letter-spacing:3px;z-index:10;text-shadow:0 0 20px rgba(212,160,48,0.4)}
.input-area{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.input-area input{background:rgba(15,12,5,0.8);border:1px solid #d4a03044;color:#d4b868;padding:8px 14px;font-family:Georgia,serif;width:260px;border-radius:4px}
.input-area button{background:rgba(212,160,48,0.2);border:1px solid #d4a03044;color:#d4a030;padding:8px 14px;cursor:pointer;font-family:Georgia,serif;border-radius:4px}
.info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.8em;color:#8a7030;z-index:10}
#msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:0.9em;color:#d4a030;z-index:10;opacity:0;transition:opacity 1s}
nav.nav-links{position:fixed;top:8px;left:8px;z-index:20;font-size:0.75em}
nav.nav-links a{color:#d4a03088;text-decoration:none;margin-right:8px}
nav.nav-links a:hover{color:#d4a030}
</style></head><body>

<h1>THE APIARY</h1>
<div id="msg"></div>
<canvas id="c"></canvas>
<div class="input-area">
<input id="inp" placeholder="Seal a thought in honeycomb..." maxlength="40">
<button onclick="seal()">Seal in Wax</button>
</div>
<div class="info">Each cell preserves one thought in amber honey • Click a cell to taste its sweetness</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();window.onresize=resize;
let cells=[],bees=[],pollen=[];
// Honeycomb grid
const hexR=35,hexH=hexR*Math.sqrt(3);
function buildGrid(){
cells=[];
const cols=Math.ceil(W/(hexR*1.5))+1,rows=Math.ceil(H/hexH)+1;
for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
const x=c*hexR*1.5+60,y=r*hexH+(c%2)*hexH/2+60;
if(x>W-30||y>H-60)continue;
cells.push({x,y,text:null,alpha:0.15,filled:false,hoverAlpha:0});
}}
buildGrid();
// Bees
for(let i=0;i<12;i++)bees.push({x:Math.random()*W,y:Math.random()*H,tx:Math.random()*W,ty:Math.random()*H,wingPhase:Math.random()*Math.PI*2,size:4+Math.random()*3});
let saved=JSON.parse(localStorage.getItem('apiary_thoughts')||'[]');
saved.forEach((s,i)=>{
if(i<cells.length){const ci=Math.floor(Math.random()*cells.length);
if(!cells[ci].filled){cells[ci].text=s.text;cells[ci].filled=true;cells[ci].alpha=0.5}}
});
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.style.opacity=1;setTimeout(()=>m.style.opacity=0,3000)}
function seal(){
const inp=document.getElementById('inp'),t=inp.value.trim();if(!t)return;
const empty=cells.filter(c=>!c.filled);
if(empty.length===0){showMsg('Every cell is full. The hive overflows with memory.');return}
const cell=empty[Math.floor(Math.random()*empty.length)];
cell.text=t;cell.filled=true;cell.alpha=0.3;
saved.push({text:t,time:Date.now()});localStorage.setItem('apiary_thoughts',JSON.stringify(saved.slice(-100)));
inp.value='';showMsg('Your thought is sealed in golden wax...');
for(let i=0;i<8;i++)pollen.push({x:cell.x,y:cell.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:40,maxLife:40});
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===document.getElementById('inp'))seal()});
C.addEventListener('click',e=>{
const closest=cells.reduce((b,c)=>{const d=Math.hypot(c.x-e.clientX,c.y-e.clientY);return d<b.d?{c,d}:b},{c:null,d:hexR});
if(closest.c&&closest.c.text)showMsg(`"${closest.c.text}"`);
});
let typed='';
document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('swarm')){bees.forEach(b=>{b.tx=W/2;b.ty=H/2});showMsg('The swarm gathers...')}
if(typed.includes('honey')){cells.filter(c=>c.filled).forEach(c=>c.alpha=0.8);showMsg('The honey glows golden, every preserved thought radiant.')}
if(typed.includes('smoke')){showMsg('Smoke calms the hive. The bees slow their dance.');bees.forEach(b=>b.size*=0.5)}
});
function drawHex(x,y,r){X.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;X.lineTo(x+r*Math.cos(a),y+r*Math.sin(a))}X.closePath()}
function draw(){
X.fillStyle='rgba(15,12,5,0.08)';X.fillRect(0,0,W,H);
const t=Date.now()*0.001;
// Honeycomb cells
cells.forEach(c=>{
const fillAlpha=c.filled?c.alpha+Math.sin(t+c.x*0.01)*0.05:0.03;
drawHex(c.x,c.y,hexR-2);
X.fillStyle=c.filled?`rgba(212,160,48,${fillAlpha})`:`rgba(80,60,20,${fillAlpha})`;X.fill();
X.strokeStyle=`rgba(180,140,40,${0.15+Math.sin(t*0.5+c.x*0.02)*0.05})`;X.lineWidth=1;X.stroke();
if(c.filled&&c.text){X.font='9px Georgia';X.fillStyle=`rgba(212,180,80,${fillAlpha*0.8})`;X.textAlign='center';
X.fillText(c.text.slice(0,12),c.x,c.y+3)}
});
// Bees
bees.forEach(b=>{
b.x+=(b.tx-b.x)*0.005+Math.sin(t*3+b.x)*0.5;b.y+=(b.ty-b.y)*0.005+Math.cos(t*2.5+b.y)*0.5;
if(Math.random()<0.005){b.tx=Math.random()*W;b.ty=Math.random()*H}
b.wingPhase+=0.3;
// Body
X.fillStyle='rgba(200,160,40,0.6)';X.beginPath();X.ellipse(b.x,b.y,b.size,b.size*0.6,0,0,Math.PI*2);X.fill();
// Stripes
X.fillStyle='rgba(40,30,10,0.4)';X.fillRect(b.x-b.size*0.3,b.y-b.size*0.6,b.size*0.3,b.size*1.2);
// Wings
const wing=Math.sin(b.wingPhase)*b.size;
X.fillStyle='rgba(255,255,255,0.15)';
X.beginPath();X.ellipse(b.x,b.y-wing,b.size*0.8,b.size*0.3,0,0,Math.PI*2);X.fill();
});
// Pollen
pollen=pollen.filter(p=>{p.life--;p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;
X.fillStyle=`rgba(230,200,80,${p.life/p.maxLife*0.5})`;X.beginPath();X.arc(p.x,p.y,2,0,Math.PI*2);X.fill();
return p.life>0});
requestAnimationFrame(draw);
}
draw();
</script></body></html>
