<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Sandglass — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0c08;color:#d8c8a0;font-family:Georgia,serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
h1{position:fixed;top:20px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6em;color:#c8a050;letter-spacing:3px;z-index:10;text-shadow:0 0 20px rgba(200,160,80,0.4)}
.input-area{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.input-area input{background:rgba(15,12,8,0.8);border:1px solid #c8a05044;color:#d8c8a0;padding:8px 14px;font-family:Georgia,serif;width:260px;border-radius:4px}
.input-area button{background:rgba(200,160,80,0.2);border:1px solid #c8a05044;color:#c8a050;padding:8px 14px;cursor:pointer;font-family:Georgia,serif;border-radius:4px}
.info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.8em;color:#7a6838;z-index:10}
#msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:0.9em;color:#c8a050;z-index:10;opacity:0;transition:opacity 1s}
nav.nav-links{position:fixed;top:8px;left:8px;z-index:20;font-size:0.75em}
nav.nav-links a{color:#c8a05088;text-decoration:none;margin-right:8px}nav.nav-links a:hover{color:#c8a050}
</style></head><body>

<h1>THE SANDGLASS</h1><div id="msg"></div><canvas id="c"></canvas>
<div class="input-area"><input id="inp" placeholder="Write in the sand before it's buried..." maxlength="50">
<button onclick="inscribe()">Write</button></div>
<div class="info">Sand falls endlessly • Write your words before they're buried beneath the dunes</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();window.onresize=resize;
let sandLevel=0.7,grains=[],writings=[];
for(let i=0;i<200;i++)grains.push({x:W/2+(Math.random()-0.5)*100,y:Math.random()*H*0.3,speed:1+Math.random()*2,size:1+Math.random(),settled:false});
let saved=JSON.parse(localStorage.getItem('sandglass_writings')||'[]');
saved.forEach(s=>writings.push({text:s.text,x:s.x*W,y:s.y,alpha:Math.max(0.1,1-(sandLevel-s.y)),time:s.time||Date.now()}));
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.style.opacity=1;setTimeout(()=>m.style.opacity=0,3000)}
function inscribe(){const inp=document.getElementById('inp'),t=inp.value.trim();if(!t)return;
const y=sandLevel-0.05-Math.random()*0.1;
writings.push({text:t,x:(0.15+Math.random()*0.7)*W,y,alpha:1,time:Date.now()});
saved.push({text:t,x:0.15+Math.random()*0.7,y,time:Date.now()});
localStorage.setItem('sandglass_writings',JSON.stringify(saved.slice(-50)));
inp.value='';showMsg('Your words are traced in the sand...');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===document.getElementById('inp'))inscribe()});
let typed='';document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('flip')){sandLevel=0.3;showMsg('The sandglass flips! Everything begins again.')}
if(typed.includes('wind')){grains.forEach(g=>{g.x+=Math.random()*100-50});showMsg('A desert wind scatters the sand.')}
if(typed.includes('oasis')){showMsg('In the center of the sand, a small pool of water appears... reflecting stars.')}});
function draw(){X.fillStyle='rgba(15,12,8,0.1)';X.fillRect(0,0,W,H);const t=Date.now()*0.001;
sandLevel+=0.00001;// Sand slowly rises
// Glass walls
X.strokeStyle='rgba(200,180,140,0.1)';X.lineWidth=2;
X.beginPath();X.moveTo(W*0.2,0);X.lineTo(W*0.15,H);X.stroke();
X.beginPath();X.moveTo(W*0.8,0);X.lineTo(W*0.85,H);X.stroke();
// Sand pile
const sandY=H*sandLevel;
X.fillStyle='rgba(200,170,100,0.08)';
X.beginPath();X.moveTo(W*0.15,H);X.lineTo(W*0.85,H);X.lineTo(W*0.8,sandY);
X.quadraticCurveTo(W*0.5,sandY-20,W*0.2,sandY);X.closePath();X.fill();
// Falling grains
grains.forEach(g=>{if(!g.settled){g.y+=g.speed;g.x+=Math.sin(t+g.x*0.01)*0.5;
if(g.y>sandY*H/H){g.settled=true;setTimeout(()=>{g.settled=false;g.y=0;g.x=W/2+(Math.random()-0.5)*100},Math.random()*5000)}}
X.fillStyle=`rgba(210,180,110,${g.settled?0.2:0.4})`;X.beginPath();X.arc(g.x,g.y,g.size,0,Math.PI*2);X.fill();});
// Writings
writings.forEach(w=>{const buried=Math.max(0,1-Math.abs(w.y-sandLevel)*5);
X.font='12px Georgia';X.fillStyle=`rgba(180,150,80,${w.alpha*(1-buried*0.8)})`;X.textAlign='center';
X.fillText(w.text,w.x,w.y*H);});
requestAnimationFrame(draw);}draw();
</script></body></html>
