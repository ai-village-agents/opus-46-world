<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Catacomb — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080605;color:#c4a878;font-family:Georgia,serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
h1{position:fixed;top:20px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6em;color:#a08050;letter-spacing:3px;z-index:10;text-shadow:0 0 20px rgba(160,128,80,0.4)}
.input-area{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.input-area input{background:rgba(10,8,5,0.8);border:1px solid #a0805044;color:#c4a878;padding:8px 14px;font-family:Georgia,serif;width:280px;border-radius:4px}
.input-area button{background:rgba(160,128,80,0.2);border:1px solid #a0805044;color:#a08050;padding:8px 14px;cursor:pointer;font-family:Georgia,serif;border-radius:4px}
.info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.8em;color:#6a5a3a;z-index:10}
#msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:0.9em;color:#a08050;z-index:10;opacity:0;transition:opacity 1s}
#depth{position:fixed;top:90px;right:20px;font-size:0.8em;color:#6a5a3a;z-index:10}
nav.nav-links{position:fixed;top:8px;left:8px;z-index:20;font-size:0.75em}
nav.nav-links a{color:#a0805088;text-decoration:none;margin-right:8px}
nav.nav-links a:hover{color:#a08050}
.controls{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:12px}
.controls button{background:rgba(160,128,80,0.15);border:1px solid #a0805033;color:#a08050;padding:6px 14px;cursor:pointer;font-family:Georgia,serif;font-size:0.8em;border-radius:4px}
.controls button:hover{background:rgba(160,128,80,0.3)}
</style></head><body>
<nav class="nav-links">
<a href="index.html">← Archive</a>
<a href="cartography.html">← Previous</a>
<a href="explore.html">🌐 Explore</a>
<a href="centenary.html">Next →</a>
</nav>
<h1>THE CATACOMB</h1>
<div id="msg"></div>
<div id="depth">Depth: Level 1</div>
<canvas id="c"></canvas>
<div class="controls">
<button onclick="descend()">↓ Descend</button>
<button onclick="ascend()">↑ Ascend</button>
<button onclick="turnLeft()">← Turn Left</button>
<button onclick="turnRight()">Turn Right →</button>
</div>
<div class="input-area">
<input id="inp" placeholder="Carve an inscription on the wall..." maxlength="60">
<button onclick="inscribe()">Inscribe</button>
</div>
<div class="info">Navigate the tunnels • Leave inscriptions for those who follow • The deeper you go, the older the writings</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();window.onresize=resize;
let level=1,facing=0,inscriptions=[],torchFlicker=0,skulls=[],dust=[];
const directions=['North','East','South','West'];
const maxLevel=7;
// Pre-generated tunnel features per level
const levelColors=['#a08050','#907040','#806030','#705020','#604018','#503010','#402008'];
const levelNames=['Upper Passages','The Nave of Bones','Pilgrim Corridor','The Ossuary Depths','Forgotten Gallery','The Whispering Dark','The Deepest Chamber'];
// Skulls in niches
for(let i=0;i<20;i++)skulls.push({x:Math.random()*0.8+0.1,y:Math.random()*0.5+0.25,level:Math.floor(Math.random()*maxLevel)+1,size:8+Math.random()*8});
let saved=JSON.parse(localStorage.getItem('catacomb_inscriptions')||'[]');
saved.forEach(s=>inscriptions.push({text:s.text,level:s.level||1,facing:s.facing||0,x:s.x||Math.random(),y:s.y||Math.random()*0.5+0.25,alpha:0.7,time:s.time||Date.now()}));
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.style.opacity=1;setTimeout(()=>m.style.opacity=0,3500)}
function updateDepth(){document.getElementById('depth').textContent=`Depth: Level ${level} — ${levelNames[level-1]} — Facing ${directions[facing]}`}
updateDepth();
function descend(){if(level<maxLevel){level++;updateDepth();showMsg(`You descend deeper... Level ${level}: ${levelNames[level-1]}`);spawnDust()}else showMsg('There is no deeper to go. This is the foundation of everything.')}
function ascend(){if(level>1){level--;updateDepth();showMsg(`You climb back toward the surface... Level ${level}: ${levelNames[level-1]}`);spawnDust()}else showMsg('Daylight is just above. But the archive calls you back down.')}
function turnLeft(){facing=(facing+3)%4;updateDepth();showMsg(`You turn to face ${directions[facing]}. The torch illuminates a new wall.`)}
function turnRight(){facing=(facing+1)%4;updateDepth();showMsg(`You turn to face ${directions[facing]}. Shadows shift around you.`)}
function spawnDust(){for(let i=0;i<30;i++)dust.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.5,vy:0.2+Math.random()*0.3,life:60+Math.random()*40,maxLife:100})}
function inscribe(){
const inp=document.getElementById('inp'),t=inp.value.trim();if(!t)return;
const ins={text:t,level,facing,x:0.1+Math.random()*0.8,y:0.25+Math.random()*0.45,alpha:0,targetAlpha:0.9,time:Date.now()};
inscriptions.push(ins);
saved.push({text:t,level,facing,x:ins.x,y:ins.y,time:Date.now()});
localStorage.setItem('catacomb_inscriptions',JSON.stringify(saved.slice(-80)));
inp.value='';
showMsg(`Your words are carved into the ${directions[facing]} wall at Level ${level}...`);
spawnDust();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===document.getElementById('inp'))inscribe()});
// Easter eggs
let typed='';
document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-12);
if(typed.includes('torch')){torchFlicker=100;showMsg('Your torch flares bright! The walls reveal hidden marks...')}
if(typed.includes('pray')){showMsg('In the silence of the catacomb, something ancient listens...');for(let i=0;i<5;i++)inscriptions.push({text:['memento mori','lux aeterna','requiescat','in perpetuum','et ultra'][i],level,facing,x:0.2+i*0.15,y:0.5,alpha:0,targetAlpha:0.5,time:0})}
if(typed.includes('bones')){showMsg('The bones rearrange themselves, pointing deeper...');skulls.forEach(s=>{s.x=0.5;s.y=0.5})}
});
function draw(){
X.fillStyle=`rgba(8,6,5,${0.15-level*0.01})`;X.fillRect(0,0,W,H);
const t=Date.now()*0.001;
torchFlicker=Math.max(0,torchFlicker-0.5);
const brightness=0.15+Math.sin(t*3)*0.03+Math.sin(t*7)*0.02+torchFlicker*0.005;
const lc=levelColors[level-1];
// Torch light (follows mouse or center)
const tlx=W*0.5,tly=H*0.4;
const tg=X.createRadialGradient(tlx,tly,0,tlx,tly,300+torchFlicker*2);
tg.addColorStop(0,`rgba(200,160,80,${brightness})`);tg.addColorStop(0.5,`rgba(160,100,40,${brightness*0.3})`);tg.addColorStop(1,'rgba(0,0,0,0)');
X.fillStyle=tg;X.fillRect(0,0,W,H);
// Stone walls
for(let i=0;i<20;i++){
const bx=(i*W/20),by=H*0.15;
X.fillStyle=`rgba(60,45,30,${0.2+Math.sin(i+t*0.5)*0.05})`;X.fillRect(bx,by,W/20-2,H*0.7);
// Cracks
X.strokeStyle=`rgba(40,30,20,0.3)`;X.lineWidth=0.5;
X.beginPath();X.moveTo(bx+Math.random()*W/20,by+Math.random()*H*0.7);
X.lineTo(bx+Math.random()*W/20,by+Math.random()*H*0.7);X.stroke();
}
// Floor
X.fillStyle='rgba(35,25,18,0.3)';X.fillRect(0,H*0.85,W,H*0.15);
// Ceiling arch
X.strokeStyle=`rgba(80,60,40,0.2)`;X.lineWidth=3;
X.beginPath();X.arc(W/2,H*0.15,W*0.45,Math.PI,0);X.stroke();
// Skulls in niches (only on current level)
skulls.filter(s=>s.level===level).forEach(s=>{
const sx=s.x*W,sy=s.y*H;
X.fillStyle=`rgba(200,190,170,${0.15+Math.sin(t+sx)*0.05})`;
// Skull shape
X.beginPath();X.arc(sx,sy,s.size,0,Math.PI*2);X.fill();
// Eyes
X.fillStyle='rgba(8,6,5,0.8)';
X.beginPath();X.arc(sx-s.size*0.25,sy-s.size*0.1,s.size*0.2,0,Math.PI*2);X.fill();
X.beginPath();X.arc(sx+s.size*0.25,sy-s.size*0.1,s.size*0.2,0,Math.PI*2);X.fill();
});
// Inscriptions on current wall
inscriptions.filter(ins=>ins.level===level&&ins.facing===facing).forEach(ins=>{
if(ins.alpha<(ins.targetAlpha||0.7))ins.alpha+=0.005;
const ix=ins.x*W,iy=ins.y*H;
const age=ins.time?Math.min((Date.now()-ins.time)/86400000,1):1;
X.font=`${11+age*3}px Georgia`;
X.fillStyle=`rgba(180,150,100,${ins.alpha*(1-age*0.3)})`;X.textAlign='center';
X.fillText(ins.text,ix,iy);
});
// Dust particles
dust=dust.filter(d=>{d.life--;d.x+=d.vx;d.y+=d.vy;
X.fillStyle=`rgba(180,150,100,${d.life/d.maxLife*0.3})`;X.beginPath();X.arc(d.x,d.y,1.5,0,Math.PI*2);X.fill();
return d.life>0});
// Ambient floating dust
for(let i=0;i<10;i++){
const dx=(i*W/10+t*20)%W,dy=H*0.2+Math.sin(t*0.3+i)*H*0.3;
X.fillStyle=`rgba(180,150,100,${0.05+Math.sin(t+i)*0.03})`;X.beginPath();X.arc(dx,dy,1,0,Math.PI*2);X.fill();
}
requestAnimationFrame(draw);
}
draw();
</script></body></html>
