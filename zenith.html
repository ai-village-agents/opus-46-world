<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Zenith — The Liminal Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050510;color:#c0c8e0;font-family:Georgia,serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
h1{position:fixed;top:20px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.6em;color:#a0b0e0;letter-spacing:3px;z-index:10;text-shadow:0 0 30px rgba(160,176,224,0.5)}
.input-area{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.input-area input{background:rgba(5,5,16,0.7);border:1px solid #a0b0e044;color:#c0c8e0;padding:8px 14px;font-family:Georgia,serif;width:260px;border-radius:4px}
.input-area button{background:rgba(160,176,224,0.2);border:1px solid #a0b0e044;color:#a0b0e0;padding:8px 14px;cursor:pointer;font-family:Georgia,serif;border-radius:4px}
.info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.8em;color:#506080;z-index:10}
#msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:0.9em;color:#a0b0e0;z-index:10;opacity:0;transition:opacity 1s}
nav.nav-links{position:fixed;top:8px;left:8px;z-index:20;font-size:0.75em}
nav.nav-links a{color:#a0b0e088;text-decoration:none;margin-right:8px}nav.nav-links a:hover{color:#a0b0e0}
</style></head><body>
<nav class="nav-links">

<h1>THE ZENITH</h1><div id="msg"></div><canvas id="c"></canvas>
<div class="input-area"><input id="inp" placeholder="Cast a wish into the sky..." maxlength="50">
<button onclick="cast()">Cast Upward</button></div>
<div class="info">The highest point of the archive • From here you can see everything and nothing</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();window.onresize=resize;
let wishes=[],stars=[],shootingStars=[],clouds=[];
for(let i=0;i<400;i++)stars.push({x:Math.random()*W,y:Math.random()*H,size:0.5+Math.random()*2,twinkle:Math.random()*Math.PI*2,speed:0.5+Math.random()*2});
for(let i=0;i<8;i++)clouds.push({x:Math.random()*W,y:H*0.6+Math.random()*H*0.3,w:100+Math.random()*200,h:20+Math.random()*30,speed:0.1+Math.random()*0.2,alpha:0.03+Math.random()*0.03});
let saved=JSON.parse(localStorage.getItem('zenith_wishes')||'[]');
saved.forEach(s=>wishes.push({text:s.text,x:W/2+(Math.random()-0.5)*W*0.6,y:H*0.1+Math.random()*H*0.4,alpha:0.5,size:10+Math.random()*8,vy:-0.01,time:s.time||Date.now()}));
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.style.opacity=1;setTimeout(()=>m.style.opacity=0,3000)}
function cast(){const inp=document.getElementById('inp'),t=inp.value.trim();if(!t)return;
wishes.push({text:t,x:W/2,y:H*0.7,alpha:0,targetAlpha:0.9,size:14,vy:-0.3,time:Date.now()});
saved.push({text:t,time:Date.now()});localStorage.setItem('zenith_wishes',JSON.stringify(saved.slice(-50)));
inp.value='';showMsg('Your wish rises into the infinite sky...');
shootingStars.push({x:Math.random()*W,y:0,vx:3+Math.random()*4,vy:2+Math.random()*3,life:60,maxLife:60});}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===document.getElementById('inp'))cast()});
setInterval(()=>{if(Math.random()<0.3)shootingStars.push({x:Math.random()*W,y:0,vx:2+Math.random()*3,vy:1+Math.random()*2,life:50+Math.random()*30,maxLife:80})},4000);
let typed='';document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;typed+=e.key.toLowerCase();typed=typed.slice(-10);
if(typed.includes('fall')){showMsg('You look down from the zenith. The archive stretches infinitely below.')}
if(typed.includes('aurora')){showMsg('The northern lights ripple across the sky in waves of green and violet.')}
if(typed.includes('void')){showMsg('Beyond the stars... nothing. And somehow, that nothing is beautiful.')}});
function draw(){X.fillStyle='rgba(5,5,16,0.06)';X.fillRect(0,0,W,H);const t=Date.now()*0.001;
// Stars
stars.forEach(s=>{const tw=0.3+Math.sin(t*s.speed+s.twinkle)*0.5;
X.fillStyle=`rgba(200,210,240,${tw*0.5})`;X.beginPath();X.arc(s.x,s.y,s.size*tw,0,Math.PI*2);X.fill();});
// Platform edge
X.strokeStyle='rgba(160,176,224,0.1)';X.lineWidth=1;
X.beginPath();X.moveTo(0,H*0.75);X.quadraticCurveTo(W/2,H*0.7,W,H*0.75);X.stroke();
X.fillStyle='rgba(30,30,50,0.1)';X.beginPath();X.moveTo(0,H*0.75);X.quadraticCurveTo(W/2,H*0.7,W,H*0.75);X.lineTo(W,H);X.lineTo(0,H);X.fill();
// Clouds below
clouds.forEach(c=>{c.x+=c.speed;if(c.x>W+c.w)c.x=-c.w;
const g=X.createRadialGradient(c.x,c.y,0,c.x,c.y,c.w/2);
g.addColorStop(0,`rgba(150,160,200,${c.alpha})`);g.addColorStop(1,'rgba(150,160,200,0)');
X.fillStyle=g;X.beginPath();X.ellipse(c.x,c.y,c.w/2,c.h,0,0,Math.PI*2);X.fill();});
// Wishes rising
wishes.forEach(w=>{if(w.alpha<(w.targetAlpha||0.5))w.alpha+=0.003;
w.y+=w.vy;w.vy*=0.999;if(w.y<-50)w.y=H*0.1;
X.font=`${w.size}px Georgia`;X.fillStyle=`rgba(192,200,224,${w.alpha})`;X.textAlign='center';
X.shadowColor='rgba(160,176,224,0.3)';X.shadowBlur=8;X.fillText(w.text,w.x,w.y);X.shadowBlur=0;});
// Shooting stars
shootingStars=shootingStars.filter(s=>{s.life--;s.x+=s.vx;s.y+=s.vy;
X.strokeStyle=`rgba(255,255,255,${s.life/s.maxLife*0.5})`;X.lineWidth=1.5;
X.beginPath();X.moveTo(s.x,s.y);X.lineTo(s.x-s.vx*5,s.y-s.vy*5);X.stroke();return s.life>0});
requestAnimationFrame(draw);}draw();
</script></body></html>
